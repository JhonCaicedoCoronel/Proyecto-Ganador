<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor de Menú | J&J Foods</title>
    
    <script>
        if(sessionStorage.getItem('admin_auth') !== 'true') {
            window.parent.location.href = 'login.html';
        }
    </script>

    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f1f2f6; color: #2d3436; padding: 20px; }
        
        .header-titulo { color: #2d3436; margin-bottom: 20px; font-size: 24px; border-bottom: 2px solid #ff4757; padding-bottom: 10px; }
        
        /* Formulario Dinámico */
        .form-container { 
            background: white; padding: 20px; border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 30px;
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
            transition: all 0.3s ease;
        }
        /* ✏️ Modo Edición (Color Amarillo) */
        .form-container.modo-edicion {
            background-color: #fffde7;
            border: 2px solid #fbc531;
            box-shadow: 0 4px 15px rgba(251, 197, 49, 0.3);
        }
        
        input, select, textarea {
            width: 100%; padding: 12px; border: 1px solid #dfe6e9; border-radius: 8px; font-size: 15px; outline: none;
        }
        textarea { grid-column: span 2; resize: vertical; min-height: 80px; }
        
        .btn-accion {
            padding: 12px; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px;
        }
        .btn-guardar { background: #0984e3; grid-column: span 2; }
        .btn-guardar:hover { background: #74b9ff; }
        .btn-cancelar { background: #ff4757; display: none; grid-column: span 2; margin-top: -10px; }

        /* Tabla del Menú */
        table { width: 100%; background: white; border-collapse: collapse; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        th { background: #2f3542; color: white; padding: 15px; text-align: left; font-size: 14px; }
        td { padding: 15px; border-bottom: 1px solid #f1f2f6; vertical-align: middle; }
        tr:hover { background-color: #f8f9fa; }
        
        .foto-miniatura { width: 60px; height: 50px; object-fit: cover; border-radius: 5px; }
        
        .btn-mini { padding: 8px 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 13px; color: white; margin-right: 5px; }
        .btn-edit { background: #fbc531; color: #2d3436; }
        .btn-delete { background: #ff4757; }
    </style>
</head>
<body>

    <h1 class="header-titulo">📝 Creador y Editor de Menú</h1>

    <div class="form-container" id="formCaja">
        <input type="hidden" id="platoId">
        <input type="text" id="nombrePlato" placeholder="Nombre del Plato (Ej. Combo Triple)">
        <input type="number" id="precioPlato" placeholder="Precio ($)" step="0.01">
        
        <select id="categoriaPlato">
            <option value="">Selecciona Categoría...</option>
            <option value="encebollados">🍲 Encebollados</option>
            <option value="bolones">🥟 Bolones y Tigrillos</option>
            <option value="secos">🍛 Secos y Arroces</option>
            <option value="tongas">🌴 Tongas</option>
            <option value="combos">🍔 Combos</option>
            <option value="bebidas">🥤 Bebidas</option>
        </select>
        
        <input type="text" id="fotoPlato" placeholder="Ruta de imagen (Ej. imagenes/bolon.jpg)">
        
        <textarea id="descPlato" placeholder="Descripción corta para el cliente..."></textarea>
        
        <button class="btn-accion btn-guardar" onclick="procesarPlato()" id="btnAccionPrincipal">💾 GUARDAR PLATO NUEVO</button>
        <button class="btn-accion btn-cancelar" onclick="cancelarEdicion()" id="btnCancelar">❌ Cancelar Edición</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>FOTO</th>
                <th>NOMBRE Y DESCRIPCIÓN</th>
                <th>CATEGORÍA</th>
                <th>PRECIO</th>
                <th>ACCIONES</th>
            </tr>
        </thead>
        <tbody id="tablaCuerpo">
            </tbody>
    </table>

    <script>
        const socket = io();
        let modoEdicionActivo = false;

        // 📥 RECIBIR MENÚ ACTUALIZADO (Tiempo Real)
        socket.on('actualizar-menu', (platos) => {
            const tbody = document.getElementById('tablaCuerpo');
            tbody.innerHTML = '';
            
            platos.forEach(p => {
                tbody.innerHTML += `
                    <tr>
                        <td><img src="${p.foto || 'https://via.placeholder.com/60'}" class="foto-miniatura"></td>
                        <td>
                            <strong>${p.nombre}</strong><br>
                            <span style="font-size:12px; color:#636e72;">${p.descripcion || 'Sin descripción'}</span>
                        </td>
                        <td style="text-transform: capitalize;">${p.categoria}</td>
                        <td style="font-weight: bold; color: #27ae60;">$${parseFloat(p.precio).toFixed(2)}</td>
                        <td>
                            <button class="btn-mini btn-edit" onclick='prepararEdicion(${JSON.stringify(p)})'>✏️ Editar</button>
                            <button class="btn-mini btn-delete" onclick="eliminarPlato(${p.id})">🗑️ Borrar</button>
                        </td>
                    </tr>
                `;
            });
        });

        // 🚀 PROCESAR FORMULARIO (Crear o Editar)
        function procesarPlato() {
            const id = document.getElementById('platoId').value;
            const nombre = document.getElementById('nombrePlato').value;
            const precio = document.getElementById('precioPlato').value;
            const categoria = document.getElementById('categoriaPlato').value;
            const foto = document.getElementById('fotoPlato').value;
            const descripcion = document.getElementById('descPlato').value;

            if(!nombre || !precio || !categoria) return alert("Por favor, llena el nombre, precio y categoría obligatoriamente.");

            const platoData = { nombre, precio, categoria, foto, descripcion };

            if(modoEdicionActivo) {
                // Modo Edición: Enviamos el ID para actualizar
                platoData.id = id;
                socket.emit('editar-producto', platoData);
                cancelarEdicion();
            } else {
                // Modo Creación
                socket.emit('agregar-nuevo-producto', platoData);
            }

            // Limpiar formulario
            document.getElementById('nombrePlato').value = '';
            document.getElementById('precioPlato').value = '';
            document.getElementById('categoriaPlato').value = '';
            document.getElementById('fotoPlato').value = '';
            document.getElementById('descPlato').value = '';
        }

        // ✏️ MODO EDICIÓN (Cargar datos a la caja)
        function prepararEdicion(plato) {
            modoEdicionActivo = true;
            
            // Subimos los datos del plato a los inputs
            document.getElementById('platoId').value = plato.id;
            document.getElementById('nombrePlato').value = plato.nombre;
            document.getElementById('precioPlato').value = plato.precio;
            document.getElementById('categoriaPlato').value = plato.categoria;
            document.getElementById('fotoPlato').value = plato.foto;
            document.getElementById('descPlato').value = plato.descripcion || '';

            // Cambios visuales (Caja amarilla)
            document.getElementById('formCaja').classList.add('modo-edicion');
            document.getElementById('btnAccionPrincipal').innerText = '💾 ACTUALIZAR PLATO';
            document.getElementById('btnAccionPrincipal').style.background = '#27ae60';
            document.getElementById('btnCancelar').style.display = 'block';
            
            // Scroll hacia arriba
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ❌ CANCELAR EDICIÓN
        function cancelarEdicion() {
            modoEdicionActivo = false;
            
            // Limpiar todo
            document.getElementById('platoId').value = '';
            document.getElementById('nombrePlato').value = '';
            document.getElementById('precioPlato').value = '';
            document.getElementById('categoriaPlato').value = '';
            document.getElementById('fotoPlato').value = '';
            document.getElementById('descPlato').value = '';

            // Revertir estilos
            document.getElementById('formCaja').classList.remove('modo-edicion');
            document.getElementById('btnAccionPrincipal').innerText = '💾 GUARDAR PLATO NUEVO';
            document.getElementById('btnAccionPrincipal').style.background = '#0984e3';
            document.getElementById('btnCancelar').style.display = 'none';
        }

        // 🗑️ ELIMINAR PLATO
        function eliminarPlato(id) {
            if(confirm('¿Estás 100% seguro de que deseas eliminar este plato de tu menú?')) {
                socket.emit('eliminar-producto', id);
            }
        }
    </script>
</body>
</html>
