<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-width=1.0">
  <title>Admin - La Costeñita</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background-color: #1e272e; color: white; display: flex; flex-direction: column; height: 100vh; }
    .navbar { display: flex; justify-content: space-between; align-items: center; background-color: #2f3640; padding: 15px 20px; border-bottom: 2px solid #ff4757; }
    .navbar h1 { margin: 0; font-size: 22px; color: #f5f6fa; }
    .nav-buttons { display: flex; gap: 10px; flex-wrap: wrap; }
    .nav-buttons button { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 10px 15px; border-radius: 6px; cursor: pointer; transition: 0.3s; font-weight: bold; }
    .nav-buttons button:hover { background: rgba(255,255,255,0.2); }
    .nav-buttons button.activo { background: #ff4757; border-color: #ff4757; }
    .btn-logout { background-color: #ff4757; color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-left: 20px; }
    .btn-logout:hover { background-color: #ff6b81; }
    iframe { flex-grow: 1; border: none; width: 100%; background: #f5f6fa; }
  </style>
</head>
<body>

  <div class="navbar">
    <h1>👑 J&J ADMIN</h1>
    <div class="nav-buttons">
      <button class="activo" onclick="cargarPagina('editor.html', this)">📝 Editor Menú</button>
      <button onclick="cargarPagina('reservas.html', this)">📅 Libro Reservas</button>
      <button onclick="cargarPagina('mesas.html', this)">🪑 Monitor Mesas</button>
      <button onclick="cargarPagina('cocina.html', this)">👨‍🍳 Pantalla Cocina</button>
      <button onclick="cargarPagina('historial.html', this)">📊 Historial Ventas</button>
      <button class="btn-logout" onclick="cerrarSesion()">Salir</button>
    </div>
  </div>

  <iframe id="visor" src="editor.html"></iframe>

  <script>
    const supabaseUrl = 'TU_URL_DE_SUPABASE';
    const supabaseKey = 'TU_ANON_KEY_DE_SUPABASE';
    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    // Seguridad Estricta
    async function verificarSesion() {
      const { data: { user }, error } = await supabaseClient.auth.getUser();
      if (!user || error) { window.location.href = 'login.html'; return; }

      const { data: roleData } = await supabaseClient
        .from('roles_empleados')
        .select('rol').eq('correo', user.email).single();

      if (!roleData || roleData.rol !== 'cajero') {
        alert("⛔ Acceso Denegado: Exclusivo para Cajeros.");
        window.location.href = roleData && roleData.rol === 'cocinero' ? 'cocina.html' : 'login.html';
      }
    }

    async function cerrarSesion() {
      await supabaseClient.auth.signOut();
      window.location.href = 'login.html';
    }

    function cargarPagina(url, btn) {
      document.getElementById('visor').src = url;
      document.querySelectorAll('.nav-buttons button').forEach(b => b.classList.remove('activo'));
      if(btn) btn.classList.add('activo');
    }

    verificarSesion();
  </script>
</body>
</html>
