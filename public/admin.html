<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - La Costeñita</title>
    <script>
        // ESCUDO DE SEGURIDAD
        if (!sessionStorage.getItem('usuarioLogueado') || sessionStorage.getItem('usuarioLogueado') !== 'admin') {
            window.location.href = '/login.html';
        }
    </script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body, html { height: 100vh; overflow: hidden; background: #1e222b; }
        
        .admin-header { background: #2f3542; height: 70px; display: flex; align-items: center; padding: 0 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 10; position: relative; }
        .logo-text { color: #e15f41; font-size: 22px; font-weight: bold; margin-right: 30px; letter-spacing: 1px; }
        
        .nav-links { display: flex; gap: 10px; }
        .nav-btn { text-decoration: none; color: white; font-weight: bold; padding: 10px 18px; background: rgba(255,255,255,0.1); border-radius: 8px; transition: 0.2s; font-size: 14px; cursor: pointer; border: none; }
        .nav-btn:hover { background: rgba(255,255,255,0.2); }
        .nav-btn.activo { background: #e15f41; box-shadow: 0 2px 5px rgba(225,95,65,0.4); }
        
        .btn-quiosco { margin-left: auto; background: transparent; border: 2px solid #2ed573; color: #2ed573; }
        .btn-quiosco:hover { background: #2ed573; color: #1e222b; }
        
        .btn-logout { background: #ff4757; color: white; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-left: 10px; transition: 0.2s;}
        .btn-logout:hover { background: #c44527; }

        #visor-central { width: 100%; height: calc(100vh - 70px); border: none; background: #f4f6f8; display: block; }
    </style>
</head>
<body>
    <header class="admin-header">
        <div class="logo-text">🌊 ADMIN COSTEÑITA</div>
        <nav class="nav-links">
            <a href="/editor.html" target="visor-central" class="nav-btn activo" onclick="cambiarPestana(this)">🍔 Menú</a>
            <a href="/mesas.html" target="visor-central" class="nav-btn" onclick="cambiarPestana(this)">🪑 Mesas</a>
            <a href="/cocina.html" target="visor-central" class="nav-btn" onclick="cambiarPestana(this)">👨‍🍳 Cocina</a>
            <a href="/historial.html" target="visor-central" class="nav-btn" onclick="cambiarPestana(this)">📈 Ventas</a>
            <a href="/reservas.html" target="visor-central" class="nav-btn" onclick="cambiarPestana(this)">📅 Reservas</a>
        </nav>
        <a href="/quiosco.html" target="_blank" class="nav-btn btn-quiosco">👀 Simular Cliente ↗</a>
        <button class="btn-logout" onclick="cerrarSesion()">Salir 🚪</button>
    </header>

    <!-- Eliminamos el src estático para cargarlo dinámicamente con el Tenant ID -->
    <iframe name="visor-central" id="visor-central" src=""></iframe>

    <script>
        function cambiarPestana(elementoClicado) {
            let botones = document.querySelectorAll('.nav-btn:not(.btn-quiosco)');
            botones.forEach(btn => btn.classList.remove('activo'));
            elementoClicado.classList.add('activo');
        }
        
        function cerrarSesion() {
            // Limpieza profunda de sesión para evitar cruce de datos entre sucursales
            sessionStorage.removeItem('usuarioLogueado');
            sessionStorage.removeItem('tenant_id');
            sessionStorage.removeItem('nombre_local');
            window.location.href = '/login.html';
        }

        // --- LÓGICA SAAS: ADAPTAR EL PANEL A LA FRANQUICIA ---
        document.addEventListener('DOMContentLoaded', () => {
            const miTenant = sessionStorage.getItem('tenant_id');
            const nombreLocal = sessionStorage.getItem('nombre_local');
            
            // 1. Cambiar el nombre del header
            if (nombreLocal) {
                document.querySelector('.logo-text').innerText = `🏢 ADMIN ${nombreLocal.toUpperCase()}`;
            }

            // Si detectamos que hay un inquilino válido activo
            if (miTenant) {
                // 2. Hacer que el botón "Simular Cliente" lleve al QR correcto de este local
                const btnQuiosco = document.querySelector('.btn-quiosco');
                if (btnQuiosco) {
                    btnQuiosco.href = `/quiosco.html?local=${miTenant}`;
                }

                // 3. INYECCIÓN DINÁMICA: Pegarle el Tenant ID a todos los botones del menú
                const enlaces = document.querySelectorAll('.nav-links a:not(.btn-quiosco)');
                enlaces.forEach(enlace => {
                    const urlBase = enlace.getAttribute('href');
                    enlace.setAttribute('href', `${urlBase}?local=${miTenant}`);
                });

                // 4. Cargar la página inicial (Menú) pasándole el parámetro correcto
                document.getElementById('visor-central').src = `/editor.html?local=${miTenant}`;
            } else {
                // Si alguien logró entrar pero no tiene tenant asignado, lo expulsamos por seguridad
                cerrarSesion();
            }
        });
    </script>
</body>
</html>
