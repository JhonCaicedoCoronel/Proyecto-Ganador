<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Administración - Gestión de Stock</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #f1f2f6; padding: 30px; color: #2f3542; }
        h1 { border-bottom: 3px solid #ffa502; padding-bottom: 10px; margin-bottom: 25px; }
        .form-crear { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 30px; display: flex; flex-wrap: wrap; gap: 15px; align-items: flex-end; }
        .form-grupo { display: flex; flex-direction: column; flex: 1; min-width: 150px; }
        .form-grupo label { font-size: 13px; font-weight: bold; margin-bottom: 5px; color: #57606f; }
        .form-grupo input, .form-grupo select { padding: 10px; border: 1px solid #ced4da; border-radius: 6px; font-size: 14px; }
        .btn-guardar { background: #2ed573; color: white; border: none; padding: 11px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-guardar:hover { background: #26af5f; }
        .btn-accion { padding: 6px 12px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; margin-right: 5px; }
        .btn-edit { background: #ffa502; color: white; }
        .btn-borrar { background: #ff4757; color: white; }
        .tabla-menu { width: 100%; background: white; border-collapse: collapse; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .tabla-menu th, .tabla-menu td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        .tabla-menu th { background: #2f3542; color: white; }
    </style>
</head>
<body>

    <h1>⚙️ Gestión de Menús y Control de Porciones Disponibles</h1>

    <div class="form-crear">
        <!-- Input oculto para saber si estamos editando o creando uno nuevo -->
        <input type="hidden" id="plato-id">
        
        <div class="form-grupo">
            <label>Nombre del Menú</label>
            <input type="text" id="plato-nombre" placeholder="Ej. Seco de Pollo Criollo">
        </div>
        <div class="form-grupo">
            <label>Precio ($)</label>
            <input type="number" step="0.01" id="plato-precio" placeholder="3.50">
        </div>
        <div class="form-grupo">
            <label>Porciones Disponibles (Stock)</label>
            <input type="number" id="plato-stock" placeholder="Cantidad de platos hechos">
        </div>
        <div class="form-grupo">
            <label>Categoría</label>
            <select id="plato-categoria">
                <option value="combos">Plato Fuerte / Combo</option>
                <option value="bebidas">Bebidas / Extras</option>
            </select>
        </div>
        <div class="form-grupo">
            <label>Foto URL</label>
            <input type="text" id="plato-img" placeholder="Opcional...">
        </div>
        <button class="btn-guardar" id="btn-submit" onclick="guardarPlato()">Publicar Menú 🚀</button>
    </div>

    <table class="tabla-menu">
        <thead>
            <tr>
                <th>Producto</th>
                <th>Precio</th>
                <th>Categoría</th>
                <th>Disponibles (Stock)</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="tabla-cuerpo"></tbody>
    </table>

    <script>
        const socket = io();
        let listaProductos = [];

        socket.on('cargar-menu-inicial', (productos) => { listaProductos = productos; renderizarTabla(); });
        socket.on('menu-actualizado-completo', (productos) => { listaProductos = productos; renderizarTabla(); });

        function renderizarTabla() {
            const tbody = document.getElementById('tabla-cuerpo');
            tbody.innerHTML = "";
            listaProductos.forEach(p => {
                tbody.innerHTML += `
                    <tr>
                        <td><strong>${p.nombre}</strong></td>
                        <td>$${p.precio.toFixed(2)}</td>
                        <td>${p.category.toUpperCase()}</td>
                        <td><span style="color: ${p.stock <= 3 ? '#ff4757' : '#2ed573'}; font-weight:bold;">${p.stock} un.</span></td>
                        <td>
                            <button class="btn-accion btn-edit" onclick="cargarFormularioEditar(${p.id})">✏️ Editar / Stock</button>
                            <button class="btn-accion btn-borrar" onclick="eliminarPlato(${p.id})">🗑️ Quitar</button>
                        </td>
                    </tr>
                `;
            });
        }

        function cargarFormularioEditar(id) {
            const p = listaProductos.find(prod => prod.id === id);
            if(p) {
                document.getElementById('plato-id').value = p.id;
                document.getElementById('plato-nombre').value = p.nombre;
                document.getElementById('plato-precio').value = p.precio;
                document.getElementById('plato-stock').value = p.stock;
                document.getElementById('plato-categoria').value = p.category;
                document.getElementById('plato-img').value = p.img || "";
                
                document.getElementById('btn-submit').innerText = "Actualizar Cambios 🔄";
                document.getElementById('btn-submit').style.background = "#ffa502";
            }
        }

        function guardarPlato() {
            const id = document.getElementById('plato-id').value;
            const nombre = document.getElementById('plato-nombre').value.trim();
            const precio = parseFloat(document.getElementById('plato-precio').value);
            const stock = parseInt(document.getElementById('plato-stock').value);
            const category = document.getElementById('plato-categoria').value;
            let img = document.getElementById('plato-img').value.trim();

            if (!nombre || isNaN(precio) || isNaN(stock)) return alert("Completa los campos correctamente.");
            if (!img) img = "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=500";

            const datosPlato = { nombre, precio, stock, category, img };

            if(id) {
                // Modo Edición
                datosPlato.id = parseInt(id);
                socket.emit('editar-producto', datosPlato);
            } else {
                // Modo Nuevo Plato
                socket.emit('agregar-nuevo-producto', datosPlato);
            }

            // Resetear el formulario
            document.getElementById('plato-id').value = "";
            document.getElementById('plato-nombre').value = "";
            document.getElementById('plato-precio').value = "";
            document.getElementById('plato-stock').value = "";
            document.getElementById('plato-img').value = "";
            document.getElementById('btn-submit').innerText = "Publicar Menú 🚀";
            document.getElementById('btn-submit').style.background = "#2ed573";
        }

        function eliminarPlato(id) {
            if(confirm("¿Quitar este plato?")) socket.emit('eliminar-producto', id);
        }
    </script>
</body>
</html>
