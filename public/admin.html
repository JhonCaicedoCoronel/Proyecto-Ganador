<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Maestro | J&J Foods</title>
    
    <script>
        // Si el usuario no tiene el ticket del PIN, lo patea de vuelta al login
        if(sessionStorage.getItem('admin_auth') !== 'true') {
            window.location.href = 'login.html';
        }
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #1e272e;
            overflow: hidden; /* Evita doble scroll */
        }
        /* Barra de Navegación Superior */
        .navbar {
            background-color: #2f3542;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            height: 70px;
        }
        .brand {
            font-size: 22px;
            font-weight: bold;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .brand span {
            color: #ff4757;
        }
        .nav-links {
            display: flex;
            gap: 10px;
        }
        .nav-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            font-weight: bold;
        }
        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        /* Pestaña Activa resaltada en rojo */
        .nav-btn.active {
            background: #ff4757;
            box-shadow: 0 4px 10px rgba(255, 71, 87, 0.4);
        }
        .logout-btn {
            background: transparent;
            border: 2px solid #ff4757;
            color: #ff4757;
            margin-left: 15px;
        }
        .logout-btn:hover {
            background: #ff4757;
            color: white;
        }
        /* El Marco Central (Iframe) */
        iframe {
            width: 100%;
            height: calc(100vh - 70px); /* Ocupa todo el alto menos la barra */
            border: none;
            background-color: #f1f2f6;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="brand">👑 <span>J&J ADMIN</span></div>
        <div class="nav-links">
            <button class="nav-btn active" onclick="cargarVista('editor.html', this)">📝 Editor de Menú</button>
            <button class="nav-btn" onclick="cargarVista('reservas.html', this)">📅 Libro de Reservas</button>
            <button class="nav-btn" onclick="cargarVista('mesas.html', this)">🪑 Monitor de Mesas</button>
            <button class="nav-btn" onclick="cargarVista('cocina.html', this)">👨‍🍳 Pantalla Cocina</button>
            <button class="nav-btn" onclick="cargarVista('historial.html', this)">📈 Historial Ventas</button>
            <button class="nav-btn logout-btn" onclick="cerrarSesion()">🚪 Cerrar Sesión</button>
        </div>
    </div>

    <iframe id="visor" src="editor.html"></iframe>

    <script>
        // Función para cambiar de pantalla dentro del marco y pintar el botón activo
        function cargarVista(url, botonElement) {
            // Cambia el enlace del iframe
            document.getElementById('visor').src = url;
            
            // Quita el color rojo (active) de todos los botones
            const botones = document.querySelectorAll('.nav-btn');
            botones.forEach(btn => btn.classList.remove('active'));
            
            // Le pone el color rojo solo al botón que acabas de presionar
            if(botonElement) {
                botonElement.classList.add('active');
            }
        }

        // Función para destruir el ticket de seguridad y salir
        function cerrarSesion() {
            sessionStorage.removeItem('admin_auth');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
