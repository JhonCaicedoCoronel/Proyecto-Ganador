<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin - CRUD Menú J & J</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #f1f2f6; padding: 30px; color: #2f3542; }
        .form-box { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 25px; display: flex; flex-wrap: wrap; gap: 15px; align-items: flex-end; }
        .grupo { display: flex; flex-direction: column; flex: 1; min-width: 150px; }
        .grupo label { font-size: 12px; font-weight: bold; margin-bottom: 5px; }
        .grupo input, .grupo select { padding: 10px; border: 1px solid #ced4da; border-radius: 6px; }
        .btn { padding: 10px 20px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: white; }
        table { width: 100%; background: white; border-collapse: collapse; border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #2f3542; color: white; }
    </style>
</head>
<body>

    <h1 style="margin-bottom:20px;">⚙️ Panel Base - Control Dinámico de Almuerzos</h1>
    
    <div class="form-box">
        <input type="hidden" id="crud-id">
        <div class="grupo"><label>Plato</label><input type="text" id="crud-nombre"></div>
        <div class="grupo"><label>Precio</label><input type="number" step="0.01" id="crud-precio"></div>
        <div class="grupo"><label>Porciones (Stock)</label><input type="number" id="crud-stock"></div>
        <div class="grupo">
            <label>Categoría</label>
            <select id="crud-cat">
                <option value="combos">Plato Fuerte</option>
                <option value="bebidas">Bebida / Extra</option>
            </select>
        </div>
        <div class="grupo"><label>Imagen URL</label><input type="text" id="crud-img"></div>
        <button class="btn" style="background:#2ed573;" onclick="save()">Guardar Menú 🚀</button>
    </div>

    <table>
        <thead><tr><th>Producto</th><th>Precio</th><th>Categoría</th><th>Porciones</th><th>Acciones</th></tr></thead>
        <tbody id="tabla-items"></tbody>
    </table>

    <script>
        const socket = io(); let lista = [];
        socket.on('cargar-menu-inicial', (d) => { lista = d; draw(); });
        socket.on('menu-actualizado-completo', (d) => { lista = d; draw(); });

        function draw() {
            const b = document.getElementById('tabla-items'); b.innerHTML = "";
            lista.forEach(p => {
                b.innerHTML += `<tr>
                    <td><strong>${p.nombre}</strong></td><td>$${p.precio.toFixed(2)}</td>
                    <td>${p.category.toUpperCase()}</td><td>${p.stock} porciones</td>
                    <td>
                        <button class="btn" style="background:#ffa502; padding:5px 10px; font-size:12px;" onclick="edit(${p.id})">✏️ Editar</button>
                        <button class="btn" style="background:#ff4757; padding:5px 10px; font-size:12px;" onclick="del(${p.id})">🗑️ Borrar</button>
                    </td>
                </tr>`;
            });
        }

        function edit(id) {
            const p = lista.find(x => x.id === id);
            document.getElementById('crud-id').value = p.id; document.getElementById('crud-nombre').value = p.nombre;
            document.getElementById('crud-precio').value = p.precio; document.getElementById('crud-stock').value = p.stock;
            document.getElementById('crud-cat').value = p.category; document.getElementById('crud-img').value = p.img;
        }

        function save() {
            const id = document.getElementById('crud-id').value;
            const p = {
                nombre: document.getElementById('crud-nombre').value, precio: parseFloat(document.getElementById('crud-precio').value),
                stock: parseInt(document.getElementById('crud-stock').value), category: document.getElementById('crud-cat').value,
                img: document.getElementById('crud-img').value || "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=500"
            };
            if(id) { p.id = parseInt(id); socket.emit('editar-producto', p); } else socket.emit('agregar-nuevo-producto', p);
            document.getElementById('crud-id').value = ""; document.getElementById('crud-nombre').value = "";
        }

        function del(id) { if(confirm("¿Eliminar plato?")) socket.emit('eliminar-producto', id); }
    </script>
</body>
</html>
