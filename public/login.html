<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - La Costeñita</title>
    <script>
        // ESCUDO PRO: Si el administrador ya está logueado, lo mandamos directo a su panel
        if (sessionStorage.getItem('usuarioLogueado') === 'admin' && sessionStorage.getItem('tenant_id')) {
            window.location.href = '/admin.html';
        }
    </script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1e222b; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: white; }
        .login-box { background: #2f3542; padding: 40px; border-radius: 12px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border-top: 5px solid #e15f41; width: 350px; }
        input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 6px; border: none; font-size: 16px; text-align: center; background: #f4f6f8; }
        button { background: #e15f41; color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.2s; }
        button:hover { background: #c44527; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1 style="color: #e15f41; margin-bottom: 5px;">🌊 La Costeñita</h1>
        <p style="color: #a4b0be; margin-bottom: 20px;">Acceso Seguro al Sistema</p>
        <input type="password" id="pin" placeholder="Ingresa tu PIN" onkeypress="if(event.key === 'Enter') login()">
        <button onclick="login()">Ingresar</button>
        <p id="error-msg" style="color: #ff4757; font-size: 13px; margin-top: 15px; display: none;">PIN incorrecto. Intenta nuevamente.</p>
    </div>
    
    <script>
        function login() {
            const pin = document.getElementById('pin').value;
            
            // Limpieza preventiva: Evita que se crucen sesiones si alguien más usó el dispositivo
            sessionStorage.removeItem('usuarioLogueado');
            sessionStorage.removeItem('tenant_id');
            sessionStorage.removeItem('nombre_local');
            
            let tenantAsignado = null;
            let nombreLocal = "";

            // Simulamos la base de datos de tus clientes SaaS
            if (pin === 'costeñita2024') {
                tenantAsignado = 'tenant_costenita';
                nombreLocal = 'La Costeñita';
            } else if (pin === 'negroni2024') {
                tenantAsignado = 'tenant_negroni';
                nombreLocal = 'Negroni';
            }

            if (tenantAsignado) {
                sessionStorage.setItem('usuarioLogueado', 'admin');
                sessionStorage.setItem('tenant_id', tenantAsignado);
                sessionStorage.setItem('nombre_local', nombreLocal);
                window.location.href = '/admin.html';
            } else {
                document.getElementById('error-msg').style.display = 'block';
                document.getElementById('error-msg').innerText = 'PIN incorrecto o restaurante no encontrado.';
            }
        }
    </script>
</body>
</html>
