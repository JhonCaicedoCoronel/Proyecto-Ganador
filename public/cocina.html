<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>KDS - J & J Cocina Profesional</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #1e222b; color: white; padding: 20px; margin: 0; }
        .grid-kds { display: flex; flex-wrap: wrap; gap: 20px; }
        .card-kds { background: #2f3542; padding: 15px; border-radius: 8px; width: 310px; border-left: 8px solid #2ed573; box-shadow: 0 4px 10px rgba(0,0,0,0.3); transition: all 0.4s ease; }
        
        .card-kds.pre-orden-espera { border-left: 8px dashed #ffa502; background: #3a3225; }
        
        .v-turno { background: #ff4757; color: white; padding: 4px 10px; border-radius: 6px; font-weight: bold; font-size: 18px; }
        .badge-estado { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; margin-top: 5px; }
        .badge-estado.espera { background: #ffa502; color: #1e222b; }
        
        .btn-ready { background: #2ed573; color: white; border: none; width: 100%; padding: 10px; border-radius: 6px; font-weight: bold; margin-top: 15px; cursor: pointer; font-size: 14px; }
    </style>
</head>
<body>

    <h1 style="margin-bottom:20px;">👨‍🍳 KDS - Control de Reservas J & J</h1>
    <div class="grid-kds" id="kds-contenedor"></div>

    <script>
        const socket = io();
        const cont = document.getElementById('kds-contenedor');

        socket.on('notificar-cocina', (p) => {
            const div = document.createElement('div');
            div.id = `kds-${p.id}`;
            
            let claseEspecial = "card-kds";
            let htmlEstructuraTiempo = "";
            let estadoInicialTexto = p.estadoCocinaTexto;
            let badgeClase = "badge-estado";

            // SI ES RESERVA REMOTA (Siempre entrará aquí por el nuevo flujo)
            if(p.esFantasma) {
                claseEspecial += " pre-orden-espera";
                badgeClase += " espera";
                estadoInicialTexto = "Reserva Agendada ⏳";
                
                htmlEstructuraTiempo = `
                    <div style="margin: 5px 0;">
                        <div style="background:#fff; color:#2f3542; padding:6px; border-radius:4px; font-weight:bold; font-size:14px;">
                            📆 Para el: ${p.horaLlegadaEstimada}
                        </div>
                    </div>
                `;
            }

            div.className = claseEspecial;
            div.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; font-weight:bold; border-bottom:1px solid #4b5261; padding-bottom:8px;">
                    <span class="v-turno">RESERVA #${p.turnoFila}</span>
                    <span style="font-size: 20px;">🗓️</span>
                </div>
                <p style="margin:10px 0 3px 0; font-size: 15px;"><strong>Cliente:</strong> ${p.cliente}</p>
                
                <div class="${badgeClase}">${estadoInicialTexto}</div>
                <div style="font-size:12px; color:#cbd5e1; margin-top:3px;">💳 Pago: ${p.pago}</div>
                
                ${htmlEstructuraTiempo}

                <div style="background:#1e222b; padding:12px; border-radius:6px; margin:10px 0; font-size:15px; font-weight:bold; border-left:4px solid #ff4757;">
                    ${p.item}
                </div>

                <div style="font-size:11px; color:#a4b0be; text-align:right;">ID Orden: #${p.id} | Reg: ${p.horaRegistro}</div>
                <button class="btn-ready" onclick="despachar(${p.id})">✓ Pedido Entregado / Quitar</button>
            `;
            
            cont.prepend(div);
            new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-600.wav').play().catch(() => {});
        });

        function despachar(id) {
            const el = document.getElementById(`kds-${id}`);
            if(el) { el.remove(); socket.emit('pedido-despachado-cocina', id); }
        }
    </script>
</body>
</html>
