<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>KDS - J & J Cocina Profesional</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #1e222b; color: white; padding-bottom: 30px; }
        
        .nav-admin { background: #2f3542; padding: 15px 20px; display: flex; gap: 15px; justify-content: center; margin-bottom: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); flex-wrap: wrap; }
        .nav-admin a { text-decoration: none; font-weight: bold; padding: 10px 20px; border-radius: 8px; transition: 0.2s; font-size: 15px; }
        .nav-activo { background: #ff4757; color: white; box-shadow: 0 2px 5px rgba(255,71,87,0.4); }
        .nav-inactivo { background: rgba(255,255,255,0.1); color: white; }
        .nav-inactivo:hover { background: rgba(255,255,255,0.2); }
        .nav-link { color: #2ed573; border: 1px solid #2ed573; margin-left: auto; }
        .nav-link:hover { background: #2ed573; color: white; }

        .container { padding: 0 30px; }
        .grid-kds { display: flex; flex-wrap: wrap; gap: 20px; }
        .card-kds { background: #2f3542; padding: 15px; border-radius: 12px; width: 330px; border-left: 8px solid #a8a8ff; box-shadow: 0 4px 15px rgba(0,0,0,0.4); display: flex; flex-direction: column; justify-content: space-between;}
        .mesa-badge { background: #ff4757; color: white; padding: 5px 12px; border-radius: 20px; font-weight: bold; font-size: 14px; text-align: center; margin-bottom: 15px; border: 2px dashed #fff; }
        .v-turno { background: #2ed573; color: #1e222b; padding: 4px 10px; border-radius: 6px; font-weight: bold; font-size: 16px; }
        .btn-ready { background: #2ed573; color: white; border: none; width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; margin-top: 15px; cursor: pointer; font-size: 15px; transition: 0.2s; }
        .btn-ready:hover { background: #26af5f; }
    </style>
</head>
<body>

    <nav class="nav-admin">
        <a href="/admin.html" class="nav-inactivo">🍔 Editor de Menú</a>
        <a href="/mesas.html" class="nav-inactivo">🪑 Monitor de Mesas</a>
        <a href="/cocina.html" class="nav-activo">👨‍🍳 Pantalla Cocina</a>
        <a href="/historial.html" class="nav-inactivo">📈 Historial Ventas</a>
        <a href="/quiosco.html" target="_blank" class="nav-link">👀 Ver Quiosco Cliente ↗</a>
    </nav>

    <div class="container">
        <h1 style="margin-bottom: 25px;">👨‍🍳 KDS - Pre-Órdenes en Vivo</h1>
        <div class="grid-kds" id="kds-contenedor"></div>
    </div>

    <script>
        const socket = io();
        const cont = document.getElementById('kds-contenedor');

        function pedirDatosCocina() { socket.emit('obtener-pedidos-cocina'); }
        socket.on('connect', pedirDatosCocina);
        if (socket.connected) pedirDatosCocina();

        socket.on('cargar-pedidos-cocina', (pedidos) => {
            cont.innerHTML = ""; 
            pedidos.forEach(p => renderizarTarjeta(p, false));
        });

        socket.on('notificar-cocina', (p) => { renderizarTarjeta(p, true); });

        function renderizarTarjeta(p, esNuevo) {
            if(document.getElementById(`kds-${p.id}`)) return;

            const div = document.createElement('div');
            div.id = `kds-${p.id}`;
            div.className = "card-kds";

            const numMesa = p.datosReserva ? p.datosReserva.mesa.numero : "Barra";
            const ubicacionMesa = p.datosReserva ? p.datosReserva.mesa.ubicacion : "Para Llevar";

            div.innerHTML = `
                <div>
                    <div class="mesa-badge">📍 SERVIR EN: MESA #${numMesa} (${ubicacionMesa})</div>
                    <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #4b5261; padding-bottom:8px;">
                        <span class="v-turno">TURNO #${p.turnoFila}</span>
                        <span style="font-size: 13px; color: #a4b0be;">🗓️ ${p.horaLlegadaEstimada}</span>
                    </div>
                    <p style="margin:12px 0 5px 0; font-size: 16px;"><strong>Cliente:</strong> ${p.cliente}</p>
                    <div style="font-size:12px; color:#cbd5e1;">💳 Pago: ${p.pago} - ${p.estadoCocinaTexto}</div>
                    
                    <div style="background:#1e222b; padding:15px; border-radius:8px; margin:15px 0; font-size:16px; font-weight:bold; color: #2ed573; border: 1px solid #4b5261;">
                        📝 PRE-ORDEN A PREPARAR:<br>
                        <span style="color:white; display:block; margin-top:8px;">${p.item}</span>
                    </div>
                </div>
                <div>
                    <div style="font-size:11px; color:#a4b0be; text-align:right;">ID #${p.id} | Reg: ${p.horaRegistro}</div>
                    <button class="btn-ready" onclick="despachar(${p.id})">✓ Plato Listo / Servido</button>
                </div>
            `;
            
            if (esNuevo) new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-600.wav').play().catch(() => {});
            esNuevo ? cont.prepend(div) : cont.appendChild(div);
        }

        function despachar(id) {
            const el = document.getElementById(`kds-${id}`);
            if(el) { el.remove(); socket.emit('pedido-despachado-cocina', id); }
        }
    </script>
</body>
</html>
