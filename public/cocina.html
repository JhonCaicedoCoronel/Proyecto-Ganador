<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>KDS - Cocina en Vivo</title>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        if (!sessionStorage.getItem('usuarioLogueado')) {
            window.top.location.href = '/login.html';
        }
    </script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #1e222b; color: white; padding: 20px; margin: 0; }
        .header-kds { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-historial { background: #57606f; color: white; padding: 10px 20px; border-radius: 6px; text-decoration: none; font-weight: bold; border: none; cursor: pointer; }
        .btn-historial:hover { background: #747d8c; }
        .grid-kds { display: flex; flex-wrap: wrap; gap: 20px; }
        .card-kds { background: #2f3542; padding: 15px; border-radius: 12px; width: 330px; border-left: 8px solid #a8a8ff; box-shadow: 0 4px 15px rgba(0,0,0,0.4); display: flex; flex-direction: column; justify-content: space-between; }
        .btn-ready { background: #2ed573; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; font-size: 15px; margin-top: 10px; }
        .btn-ready:hover { background: #26c267; }
        .v-turno { background: #ff4757; padding: 4px 10px; border-radius: 5px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

    <div class="header-kds">
        <h2>👨‍🍳 Panel de Cocina (KDS) - <span style="color:#2ed573">En Vivo</span></h2>
        <div>
            <a href="historial.html" class="btn-historial" target="mainFrame">Ver Historial del Día</a>
        </div>
    </div>
    
    <div class="grid-kds" id="contenedor-pedidos">
        <div style="grid-column:1/-1; text-align:center; padding:50px; color:#a4b0be; font-size:18px;">
            Sincronizando con la base de datos de Supabase...
        </div>
    </div>

    <script>
        const socket = io();
        
        // Rescatar el tenant de la sesión (o usar el de respaldo por defecto)
        let miTenant = sessionStorage.getItem('tenant_id');
        if (!miTenant || miTenant === "null" || miTenant === "undefined") {
            miTenant = 'tenant_costenita';
            sessionStorage.setItem('tenant_id', miTenant);
        }

        // Sincronización inmediata al conectar o recargar con F5
        socket.on('connect', () => {
            console.log("KDS conectado, enlazando local en tiempo real:", miTenant);
            socket.emit('unirse-a-restaurante', miTenant);
            socket.emit('obtener-pedidos-cocina', miTenant); // Envia explícitamente el identificador
        });

        socket.on('cargar-pedidos-cocina', (pedidos) => {
            const container = document.getElementById('contenedor-pedidos');
            container.innerHTML = "";

            if (!pedidos || pedidos.length === 0) {
                container.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:50px; color:#a4b0be; font-size:18px;">✨ No hay pedidos pendientes en la cola de cocina.</div>`;
                return;
            }

            pedidos.forEach(p => {
                const sucursal = p.datosReserva ? p.datosReserva.sucursal : 'Urdesa';
                const div = document.createElement('div');
                div.className = 'card-kds';
                div.innerHTML = `
                    <div>
                        <div style="font-size:12px; font-weight:bold; text-transform:uppercase; color:#ff7a00; margin-bottom:5px;">🏢 LOCAL: ${sucursal}</div>
                        <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #4b5261; padding-bottom:8px;">
                            <span class="v-turno">TURNO #${p.turnoFila}</span>
                            <span style="font-size: 13px; color: #a4b0be;">🗓️ ${p.horaLlegadaEstimada || 'Hoy'}</span>
                        </div>
                        <p style="margin:12px 0 5px 0; font-size: 16px;"><strong>Cliente:</strong> ${p.cliente}</p>
                        <div style="font-size:12px; color:#cbd5e1;">${p.estadoCocinaTexto}</div>
                        <div style="background:#1e222b; padding:15px; border-radius:8px; margin:15px 0; font-size:16px; font-weight:bold; color: #2ed573; border: 1px solid #4b5261;">
                            📝 ORDEN:<br><span style="color:white; display:block; margin-top:8px;">${p.item}</span>
                        </div>
                    </div>
                    <div><button class="btn-ready" onclick="despachar(${p.id})">✓ Plato Listo / Despachado</button></div>`;
                container.appendChild(div);
            });
        });

        socket.on('notificar-cocina', (pedido) => {
            // El servidor avisa reactivamente que entró un nuevo pedido
            socket.emit('obtener-pedidos-cocina', miTenant);
            new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-600.wav').play().catch(() => {});
        });

        function despachar(idPedido) {
            socket.emit('pedido-despachado-cocina', idPedido);
        }
    </script>
</body>
</html>
