<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>KDS - Cocina en Vivo</title>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        if (!sessionStorage.getItem('usuarioLogueado')) {
            window.top.location.href = '/login.html';
        }
    </script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #1e222b; color: white; padding: 20px; margin: 0; }
        .header-kds { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-historial { background: #57606f; color: white; padding: 10px 20px; border-radius: 6px; text-decoration: none; font-weight: bold; border: none; cursor: pointer; }
        .btn-historial:hover { background: #747d8c; }
        .grid-kds { display: flex; flex-wrap: wrap; gap: 20px; }
        .card-kds { background: #2f3542; padding: 15px; border-radius: 12px; width: 330px; border-left: 8px solid #a8a8ff; box-shadow: 0 4px 15px rgba(0,0,0,0.4); display: flex; flex-direction: column; justify-content: space-between; }
        .btn-ready { background: #2ed573; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; font-size: 15px; margin-top: 10px; }
        .btn-ready:hover { background: #26c267; }
        .v-turno { background: #ff4757; padding: 4px 10px; border-radius: 5px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

    <div class="header-kds">
        <h2>👨‍🍳 Panel de Cocina (KDS) - <span style="color:#2ed573">En Vivo</span></h2>
        <div>
            <a href="historial.html" class="btn-historial" target="mainFrame">Ver Historial del Día</a>
        </div>
    </div>
    
    <div class="grid-kds" id="contenedor-pedidos">
        <div style="grid-column:1/-1; text-align:center; padding:50px; color:#a4b0be; font-size:18px;">
            Sincronizando con la base de datos de Supabase...
        </div>
    </div>

    <script>
        const socket = io();
        const miTenant = sessionStorage.getItem('tenant_id') || 'tenant_costenita';
        const contenedorKDS = document.getElementById('kds-contenedor');

        socket.on('connect', () => {
            if (miTenant) {
                socket.emit('unirse-a-restaurante', miTenant);
                // BLINDAJE ABSOLUTO: Consultamos el estado exacto de Supabase al conectar o refrescar
                solicitarDatosSupabase();
            } else {
                window.top.location.href = '/login.html';
            }
        });

        function solicitarDatosSupabase() {
            socket.emit('obtener-pedidos-cocina', miTenant);
        }

        socket.on('cargar-pedidos-cocina', (pedidos) => {
            contenedorKDS.innerHTML = "";
            if (!pedidos || pedidos.length === 0) {
                contenedorKDS.innerHTML = "<p style='padding:25px; color:#cbd5e1; font-size:18px;'>🎉 ¡Cocina impecable! Sin comandas pendientes.</p>";
                return;
            }
            pedidos.forEach(p => dibujarTarjetaComanda(p, false));
        });

        socket.on('notificar-cocina', (pedido) => {
            dibujarTarjetaComanda(pedido, true);
        });

        function dibujarTarjetaComanda(p, esNuevo) {
            // Si el elemento ya existe en la pantalla, solo actualizamos su badge de turno por si se movió la fila
            if (document.getElementById(`comanda-${p.id}`)) {
                document.getElementById(`badge-turno-${p.id}`).innerText = `TURNO #${p.turno_sala}`;
                return;
            }

            const tarjeta = document.createElement('div');
            tarjeta.id = `comanda-${p.id}`;
            tarjeta.className = "card-kds";
            
            tarjeta.innerHTML = `
                <div>
                    <div class="mesa-badge">🪑 MESA #${p.mesa_id || 'Barra'} <span class="sucursal-txt">🏢 ${p.sucursal || 'Sucursal'}</span></div>
                    <div style="display:flex; justify-content:space-between; margin-top:8px; border-bottom:1px solid #4b5261; padding-bottom:6px;">
                        <span class="v-turno" id="badge-turno-${p.id}">TURNO #${p.turno_sala}</span>
                        <span style="font-size:12px; color:#a4b0be;">⏱️ ${p.hora || 'Ahora'}</span>
                    </div>
                    <p style="margin:10px 0 4px 0;"><strong>Cliente:</strong> ${p.cliente}</p>
                    <div style="background:#1e222b; padding:12px; border-radius:6px; margin:10px 0; font-weight:bold; color:#2ed573; border:1px solid #4b5261;">
                        📝 DETALLE DEL PLATO:<br>
                        <span style="color:white; font-size:16px; display:block; margin-top:5px;">${p.item}</span>
                    </div>
                </div>
                <div><button class="btn-ready" onclick="completarDespacho(${p.id})">✓ Plato Listo / Despachar</button></div>
            `;

            if (esNuevo) {
                new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-600.wav').play().catch(()=>{});
            }
            contenedorKDS.appendChild(tarjeta);
        }

        function completarDespacho(idPedido) {
            const card = document.getElementById(`comanda-${idPedido}`);
            if (card) {
                card.style.opacity = '0.4';
                // Emitimos el despacho enviando el ID correlativo a Supabase
                socket.emit('pedido-despachado-cocina', { id: idPedido, tenant_id: miTenant });
            }
        }
    </script>
</body>
</html>
