<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-width=1.0">
  <title>Cocina - La Costeñita</title>
  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #111; color: white; }
    header { display: flex; justify-content: space-between; align-items: center; background-color: #ff9f43; padding: 15px 20px; border-radius: 8px; margin-bottom: 20px; color: black; }
    h1 { margin: 0; font-size: 24px; font-weight: bold; }
    .btn-logout { background-color: #e15f41; color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; }
    /* AQUÍ VAN TUS ESTILOS DE TARJETAS DE COCINA ANTERIORES */
  </style>
</head>
<body>

  <header>
    <h1>👨‍🍳 KDS La Costeñita</h1>
    <button class="btn-logout" onclick="cerrarSesion()">Cerrar Sesión</button>
  </header>

  <div id="contenedor-pedidos">
    </div>

  <script>
    const supabaseUrl = 'TU_URL_DE_SUPABASE';
    const supabaseKey = 'TU_ANON_KEY_DE_SUPABASE';
    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    // Seguridad Estricta
    async function verificarSesion() {
      const { data: { user }, error } = await supabaseClient.auth.getUser();
      if (!user || error) { window.location.href = 'login.html'; return; }

      const { data: roleData } = await supabaseClient
        .from('roles_empleados')
        .select('rol').eq('correo', user.email).single();

      if (!roleData || roleData.rol !== 'cocinero') {
        alert("⛔ Acceso Denegado: Exclusivo para Cocineros.");
        window.location.href = roleData && roleData.rol === 'cajero' ? 'admin.html' : 'login.html';
      }
    }

    async function cerrarSesion() {
      await supabaseClient.auth.signOut();
      window.location.href = 'login.html';
    }

    verificarSesion();

    // AQUÍ VA TU LÓGICA DE SOCKET.IO Y SUPABASE PARA DIBUJAR LOS PEDIDOS
  </script>
</body>
</html>
