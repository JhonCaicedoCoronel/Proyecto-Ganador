<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>KDS - Pantalla de Cocina Pro</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #1e222b; color: white; padding: 20px; margin: 0; }
        .grid-kds { display: flex; flex-wrap: wrap; gap: 20px; }
        .card-kds { background: #2f3542; padding: 15px; border-radius: 8px; width: 310px; border-left: 8px solid #2ed573; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .card-kds.remoto-tarjeta { border-left-color: #a8a8ff; background: #222533; }
        .card-kds.remoto-efectivo { border-left-color: #ffa502; background: #3a3225; }
        .card-kds.local-efectivo { border-left-color: #ff4757; }
        .badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; margin-top: 5px; background: #57606f; }
        .alergia-alert { background: #ff4757; color: white; padding: 8px; border-radius: 4px; font-size: 12px; font-weight: bold; margin-top: 5px; border: 1px dashed white; }
        .btn-ready { background: #2ed573; color: white; border: none; width: 100%; padding: 10px; border-radius: 6px; font-weight: bold; margin-top: 15px; cursor: pointer; }
    </style>
</head>
<body>

    <h1 style="margin-bottom:20px;">👨‍🍳 KDS - Control de Producción y Tiempos de Arribo</h1>
    <div class="grid-kds" id="kds-contenedor"></div>

    <script>
        const socket = io();
        const cont = document.getElementById('kds-contenedor');

        socket.on('notificar-cocina', (p) => {
            const div = document.createElement('div');
            div.id = `kds-${p.id}`;
            
            // Lógica de asignación de clases según las especificaciones operativas fijadas
            let claseEspecial = "card-kds";
            if(p.esFantasma) {
                claseEspecial += (p.pago === 'Tarjeta') ? " remoto-tarjeta" : " remoto-efectivo";
            } else {
                if(p.pago === 'Efectivo') claseEspecial += " local-efectivo";
            }

            // Validar si el cliente reportó alergias críticas
            let htmlAlergia = "";
            if(p.perfilCliente && p.perfilCliente.alergias.toLowerCase() !== "ninguna" && p.perfilCliente.alergias !== "") {
                htmlAlergia = `<div class="alergia-alert">⚠️ ALERGIA REPORTE: ${p.perfilCliente.alergias.toUpperCase()}</div>`;
            }

            div.className = claseEspecial;
            div.innerHTML = `
                <div style="display:flex; justify-content:space-between; font-weight:bold; border-bottom:1px solid #4b5261; padding-bottom:5px;">
                    <span>🆔 Orden #${p.id}</span>
                    <span>${p.tipo.includes('Remota') ? '🚗' : '🍽️'}</span>
                </div>
                <p style="margin:8px 0 3px 0;"><strong>Cliente:</strong> ${p.cliente}</p>
                <div style="font-size:12px; color:#ffa502; font-weight:bold;">⚙️ Estado: ${p.estadoCocinaTexto}</div>
                <div style="font-size:12px; color:#a4b0be;">⏱️ Arribo Estimado: ${p.horaLlegadaEstimada}</div>
                
                ${htmlAlergia}

                <div style="background:#1e222b; padding:10px; border-radius:6px; margin:10px 0; font-size:14px; font-weight:bold; border-left:3px solid #ff4757;">
                    ${p.item}
                </div>

                <div style="font-size:11px; color:#a4b0be; text-align:right;">Ingreso: ${p.horaRegistro}</div>
                <button class="btn-ready" onclick="despachar(${p.id})">✓ Despachar / Entregado 🚀</button>
            `;
            cont.prepend(div);
        });

        function despachar(id) {
            const el = document.getElementById(`kds-${id}`);
            if(el) { el.remove(); socket.emit('pedido-despachado-cocina', id); }
        }
    </script>
</body>
</html>
