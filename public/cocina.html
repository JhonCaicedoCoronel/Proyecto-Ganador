<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>KDS Cocina</title>
    <style>
        body { font-family: Arial; background: #111; color: white; padding: 20px; }
        .grid-cocina { display: flex; gap: 15px; flex-wrap: wrap; }
        .ticket { background: #222; border-left: 5px solid #e74c3c; padding: 15px; width: 300px; border-radius: 8px; }
        .turno { font-size: 40px; color: #f1c40f; margin: 0; font-weight: 900; }
        .mesa { color: #3498db; font-weight: bold; font-size: 20px; }
        button { background: #2ecc71; color: white; border: none; padding: 10px; width: 100%; font-size: 18px; cursor: pointer; border-radius: 5px; margin-top: 15px; }
    </style>
</head>
<body>
    <h1>👨‍🍳 Pantalla de Cocina / KDS</h1>
    <div id="cola-pedidos" class="grid-cocina"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        window.onload = () => socket.emit('pedir-pedidos-cocina');
        socket.on('notificar-cocina', () => socket.emit('pedir-pedidos-cocina'));

        socket.on('renderizar-cocina', (pedidos) => {
            const div = document.getElementById('cola-pedidos');
            div.innerHTML = '';
            
            // Filtramos solo los pendientes
            const pendientes = pedidos.filter(p => p.estado === 'Pendiente');
            
            pendientes.forEach(p => {
                let itemsStr = "";
                try {
                    let items = JSON.parse(p.items);
                    items.forEach(i => itemsStr += `<li>${i.nombre}</li>`);
                } catch(e) {}

                div.innerHTML += `
                    <div class="ticket">
                        <p style="margin:0; color:#aaa;">Sucursal: ${p.sucursal}</p>
                        <h2 class="turno">TURNO: ${p.turno}</h2>
                        ${p.mesa_id ? `<p class="mesa">Servir en Mesa ID: ${p.mesa_id}</p>` : '<p class="mesa">Para Llevar / Sin Mesa</p>'}
                        <p><b>Cliente:</b> ${p.cliente}</p>
                        <hr>
                        <ul>${itemsStr}</ul>
                        <button onclick="despachar('${p.id}', '${p.turno}')">✓ DESPACHAR TURNO</button>
                    </div>
                `;
            });
        });

        function despachar(id, turno) {
            socket.emit('despachar-pedido', id, turno);
        }
    </script>
</body>
</html>
