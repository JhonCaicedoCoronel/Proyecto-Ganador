<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frank's Burgers - Quiosco Inteligente</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #f8f9fa; display: flex; height: 100vh; overflow: hidden; }
        
        .main-layout { width: 70%; padding: 25px; overflow-y: auto; height: 100%; position: relative; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #ff4757; padding-bottom: 15px; margin-bottom: 20px; }
        
        /* Botón Flotante del Carrito */
        .btn-ver-carrito { background: #ff4757; color: white; border: none; padding: 12px 24px; border-radius: 30px; font-weight: bold; font-size: 16px; cursor: pointer; box-shadow: 0 4px 10px rgba(255,71,87,0.3); display: flex; align-items: center; gap: 8px; }
        
        .seccion-titulo { margin: 20px 0 10px 0; color: #2f3542; font-size: 18px; border-left: 5px solid #ffa502; padding-left: 10px; }
        .grid-productos { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card-producto { background: white; border-radius: 12px; border: 1px solid #eee; overflow: hidden; display: flex; flex-direction: column; justify-content: space-between; }
        .card-producto img { width: 100%; height: 120px; object-fit: cover; }
        .info-producto { padding: 12px; }
        .btn-agregar { background: #ff4757; color: white; border: none; width: 100%; padding: 8px; border-radius: 6px; cursor: pointer; font-weight: bold; }

        /* CARRITO SIDEBAR (OCULTO A LA DERECHA) */
        .sidebar-carrito { width: 30%; background: white; border-left: 1px solid #ddd; height: 100%; padding: 25px; display: flex; flex-direction: column; box-shadow: -4px 0 15px rgba(0,0,0,0.05); }
        .lista-items { flex-grow: 1; overflow-y: auto; margin: 15px 0; }
        .item-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed #eee; font-size: 14px; }
        .form-grupo { margin-bottom: 10px; }
        .form-grupo label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 4px; color: #57606f; }
        .form-grupo input, .form-grupo select { width: 100%; padding: 8px; border: 1px solid #ced4da; border-radius: 6px; }

        /* BOT INTEGRADO (Esquina inferior izquierda) */
        .frank-bot { position: absolute; bottom: 20px; left: 25px; background: #2f3542; color: white; padding: 15px; border-radius: 10px; width: 280px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .frank-bot select { width: 100%; padding: 6px; margin-top: 8px; border-radius: 4px; border: none; }

        /* MODAL ENCUESTA DE CONOCIMIENTO AL CLIENTE */
        .encuesta-box { background: #e8fcf0; border: 2px dashed #2ed573; padding: 12px; border-radius: 8px; margin-top: 10px; }
    </style>
</head>
<body>

    <!-- LADO IZQUIERDO: MENÚ PRINCIPAL LIMPIO -->
    <div class="main-layout">
        <div class="header">
            <div>
                <h1 style="color:#ff4757;">🍔 Frank's Burgers</h1>
                <p style="color:#666; font-size:13px;">SaaS de Gestión Gastronómica Omnicanal</p>
            </div>
            <button class="btn-ver-carrito">
                🛒 Mi Carrito (<span id="cart-count">0</span>)
            </button>
        </div>

        <div class="seccion-titulo">Platos del Día</div>
        <div class="grid-productos" id="menu-combos"></div>
        <div class="seccion-titulo">Bebidas</div>
        <div class="grid-productos" id="menu-bebidas"></div>

        <!-- BOT ASISTENTE DE DUDAS -->
        <div class="frank-bot">
            <strong style="color:#ffa502; font-size:14px;">🤖 FrankBot - Preguntas Frecuentes</strong>
            <p style="font-size:11px; margin-top:4px; color:#ccc;">¿Tienes dudas sobre los platos o ingredientes?</p>
            <select onchange="preguntarBot(this.value)">
                <option value="">-- Haz una pregunta aquí --</option>
                <option value="ingredientes">¿Qué ingredientes tienen las hamburguesas?</option>
                <option value="alergias">¿Tienen opciones sin gluten o lactosa?</option>
                <option value="mesas">¿Cómo funciona la asignación de mesas?</option>
                <option value="promocion">¿Cómo gano la promoción del día?</option>
            </select>
            <div id="bot-respuesta" style="font-size:12px; margin-top:10px; color:#ffa502; font-style:italic;"></div>
        </div>
    </div>

    <!-- LADO DERECHO: EL CARRITO ARCHIVADO -->
    <div class="sidebar-carrito">
        <h2>Detalle de tu Pedido</h2>
        <div class="lista-items" id="carrito-contenedor">
            <p style="color:#999; text-align:center; padding-top:20px;">El carrito está vacío</p>
        </div>

        <div style="background:#f1f2f6; padding:12px; font-weight:bold; display:flex; justify-content:space-between; border-radius:6px; margin-bottom:12px;">
            <span>Total:</span><span id="total-txt">$0.00</span>
        </div>

        <div class="form-grupo">
            <label>Tu Nombre</label>
            <input type="text" id="cliente-nombre" placeholder="Para registrar la orden...">
        </div>

        <div class="form-grupo">
            <label>Modalidad</label>
            <select id="cliente-tipo" onchange="cambiarModalidad(this.value)">
                <option value="Comer Aquí">🍽️ Comer Aquí (Verificar Sala)</option>
                <option value="Para Llevar">🛍️ Para Llevar</option>
                <option value="Pre-orden Remota 👻">🚗 En camino / Pre-orden Remota 👻</option>
            </select>
            <input type="number" id="tiempo-eta" value="15" placeholder="¿En cuántos minutos llegas?" style="display:none; margin-top:5px;">
        </div>

        <div class="form-grupo">
            <label>Forma de Pago</label>
            <select id="cliente-pago">
                <option value="Tarjeta">💳 Tarjeta (Procesar de inmediato)</option>
                <option value="Efectivo">💵 Efectivo (Registrar en Caja)</option>
            </select>
        </div>

        <!-- SECCIÓN ENCUESTA INTELIGENTE: CONOCIENDO AL CLIENTE -->
        <div class="encuesta-box">
            <strong style="color:#26af5f; font-size:12px;">🎁 Encuesta de Perfil (¡Gana Papas Gratis!)</strong>
            <div class="form-grupo" style="margin-top:5px;">
                <label>¿Sufres de alguna alergia?</label>
                <input type="text" id="encuesta-alergia" placeholder="Ej. Maní, Gluten, Lactosa o Ninguna">
            </div>
            <div class="form-grupo">
                <label>¿Qué es lo que más te gusta?</label>
                <select id="encuesta-gusto">
                    <option value="Carne Res">Hamburguesas de Res bien jugosas 🥩</option>
                    <option value="Pollo Crispy">Pollo Crocante / Crispy 🍗</option>
                    <option value="Opciones Ligeras">Porciones ligeras / Bebidas de la casa 🍃</option>
                </select>
            </div>
        </div>

        <button style="background:#2ed573; color:white; border:none; width:100%; padding:14px; border-radius:8px; font-weight:bold; font-size:16px; margin-top:10px; cursor:pointer;" onclick="enviarOrdenFinal()">
            ENVIAR ORDEN AL SISTEMA 🚀
        </button>
    </div>

    <script>
        const socket = io();
        let productos = []; let carrito = []; let mesasDisponibles = 0;

        socket.on('cargar-menu-inicial', (data) => { productos = data; renderMenu(); });
        socket.on('menu-actualizado-completo', (data) => { productos = data; renderMenu(); });
        socket.on('cargar-mesas-inicial', (m) => { mesasDisponibles = m.filter(x => x.estado === 'disponible').length; });
        socket.on('mesas-actualizadas', (m) => { mesasDisponibles = m.filter(x => x.estado === 'disponible').length; });

        function renderMenu() {
            const combos = document.getElementById('menu-combos'); const bebidas = document.getElementById('menu-bebidas');
            combos.innerHTML = ""; bebidas.innerHTML = "";
            productos.forEach(p => {
                const html = `
                    <div class="card-producto">
                        <img src="${p.img}">
                        <div class="info-producto">
                            <strong style="font-size:14px;">${p.nombre}</strong>
                            <p style="color:#ff4757; font-size:13px;">$${p.precio.toFixed(2)} (${p.stock} un.)</p>
                            <button class="btn-agregar" onclick="addToCart(${p.id})" ${p.stock>0?'':'disabled'}>${p.stock>0?'Agregar +':'Agotado'}</button>
                        </div>
                    </div>`;
                if(p.category === 'combos') combos.innerHTML += html; else bebidas.innerHTML += html;
            });
        }

        function addToCart(id) {
            const p = productos.find(x => x.id === id);
            const existe = carrito.find(x => x.id === id);
            if(existe) { if(existe.cantidad < p.stock) existe.cantidad++; } else { carrito.push({...p, cantidad:1}); }
            updateCartUI();
        }

        function updateCartUI() {
            document.getElementById('cart-count').innerText = carrito.reduce((acc, x) => acc + x.cantidad, 0);
            const cont = document.getElementById('carrito-contenedor'); cont.innerHTML = "";
            let total = 0;
            if(carrito.length === 0) { cont.innerHTML = "<p style='color:#999; text-align:center;'>El carrito está vacío</p>"; document.getElementById('total-txt').innerText = "$0.00"; return; }
            carrito.forEach(c => {
                total += c.precio * c.cantidad;
                cont.innerHTML += `<div class="item-row"><span>${c.cantidad}x ${c.nombre}</span><span>$${(c.precio*c.cantidad).toFixed(2)}</span></div>`;
            });
            document.getElementById('total-txt').innerText = `$${total.toFixed(2)}`;
        }

        function cambiarModalidad(val) { document.getElementById('tiempo-eta').style.display = (val.includes('Remota')) ? 'block' : 'none'; }

        // MÓDULO INTELIGENTE FRANKBOT
        function preguntarBot(tipo) {
            const res = document.getElementById('bot-respuesta');
            if(tipo === 'ingredientes') res.innerText = "🍔 Nuestras hamburguesas usan 180g de carne de res premium, pan de masa madre artesanal hecho en casa y queso cheddar fundido.";
            else if(tipo === 'alergias') res.innerText = "🌾 ¡Atención! Puedes registrar tu alergia abajo en el formulario del carrito para que la cocina prepare tu pedido en un área libre de contaminación cruzada.";
            else if(tipo === 'mesas') res.innerText = "🪑 Al elegir 'Comer Aquí' el sistema te asigna una ubicación disponible controlada por el monitor de sala.";
            else if(tipo === 'promocion') res.innerText = "🎁 Llena las preguntas de perfil sobre tus alergias y gustos en el carrito antes de enviar la orden y reclama porciones de papas gratis en caja.";
            else res.innerText = "";
        }

        function enviarOrdenFinal() {
            const nombre = document.getElementById('cliente-nombre').value.trim();
            const tipo = document.getElementById('cliente-tipo').value;
            const pago = document.getElementById('cliente-pago').value;
            const alergia = document.getElementById('encuesta-alergia').value.trim() || "Ninguna";
            const gusto = document.getElementById('encuesta-gusto').value;

            if(carrito.length === 0 || !nombre) return alert("Completa los datos y añade artículos.");
            if(tipo === "Comer Aquí" && mesasDisponibles === 0) return alert("¡Local Lleno! Por favor selecciona la modalidad 'Para Llevar' o 'Pre-orden Remota' para asegurar tu comida.");

            const pedido = {
                id: Math.floor(Math.random() * 9000) + 1000,
                cliente: nombre,
                item: carrito.map(c => `${c.cantidad}x ${c.nombre}`).join(', '),
                tipo: tipo,
                pago: pago,
                minutosEstimados: document.getElementById('tiempo-eta').value,
                productosComprados: carrito.map(c => ({id: c.id, cantidad: c.cantidad})),
                perfilCliente: { nombre: nombre, alergias: alergia, preferencias: gusto } // Guardado en base de datos estructural
            };

            const canal = tipo.includes('Remota') ? 'enviar-preorden-fantasma' : 'enviar-pedido';
            socket.emit(canal, pedido);
            alert("🚀 Orden transmitida de forma segura.");
            carrito = []; updateCartUI(); document.getElementById('cliente-nombre').value = "";
        }
    </script>
</body>
</html>
