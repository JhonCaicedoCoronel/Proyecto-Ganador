<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>KDS - Pantalla de Cocina Profesional</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #1e222b; color: white; padding: 20px; margin: 0; }
        .grid-kds { display: flex; flex-wrap: wrap; gap: 20px; }
        
        /* --- ESTADOS VISUALES DINÁMICOS --- */
        .card-kds { background: #2f3542; padding: 15px; border-radius: 8px; width: 310px; border-left: 8px solid #2ed573; box-shadow: 0 4px 10px rgba(0,0,0,0.3); transition: all 0.4s ease; }
        
        /* Estado 1: Cuando es Pre-orden remota (Tarjeta en espera/reloj corriendo) */
        .card-kds.pre-orden-espera { border-left: 8px dashed #ffa502; background: #3a3225; }
        
        /* Estado 2: Cuando se cumple el tiempo de arribo (Se transforma en Orden Activa) */
        .card-kds.orden-activa-local { border-left: 8px solid #2ed573; background: #1f3a2b; animation: pulso-llegada 1.5s infinite; }
        
        /* Estado alterno: Local pago en efectivo pendiente */
        .card-kds.local-efectivo { border-left-color: #ff4757; }
        
        .v-turno { background: #ff4757; color: white; padding: 4px 10px; border-radius: 6px; font-weight: bold; font-size: 18px; }
        
        /* Badges de Estado */
        .badge-estado { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; margin-top: 5px; }
        .badge-estado.espera { background: #ffa502; color: #1e222b; }
        .badge-estado.arribado { background: #2ed573; color: white; }
        
        .btn-ready { background: #2ed573; color: white; border: none; width: 100%; padding: 10px; border-radius: 6px; font-weight: bold; margin-top: 15px; cursor: pointer; font-size: 14px; }
        .cronometro { font-size: 16px; font-weight: bold; color: #ff4757; background: #1e222b; padding: 4px 8px; border-radius: 4px; display: inline-block; margin-top: 5px; }

        @keyframes pulso-llegada {
            0% { box-shadow: 0 4px 10px rgba(46,213,115,0.2); }
            50% { box-shadow: 0 4px 20px rgba(46,213,115,0.6); }
            100% { box-shadow: 0 4px 10px rgba(46,213,115,0.2); }
        }
    </style>
</head>
<body>

    <h1 style="margin-bottom:20px;">👨‍🍳 J & J Foods KDS - Control de Producción y Tiempos de Arribo</h1>
    <div class="grid-kds" id="kds-contenedor"></div>

    <script>
        const socket = io();
        const cont = document.getElementById('kds-contenedor');
        let intervalosCronometro = {}; // Guardar los timers de cada pre-orden

        socket.on('notificar-cocina', (p) => {
            const div = document.createElement('div');
            div.id = `kds-${p.id}`;
            
            let claseEspecial = "card-kds";
            let htmlEstructuraTiempo = "";
            let estadoInicialTexto = p.estadoCocinaTexto;
            let badgeClase = "badge-estado";

            // SI ES PRE-ORDEN REMOTA (PEDIDO FANTASMA)
            if(p.esFantasma) {
                claseEspecial += " pre-orden-espera";
                badgeClase += " espera";
                estadoInicialTexto = "Pre-orden en camino ⏳";
                
                // Convertir minutos estimados a segundos totales para el contador regressivo
                const segundosTotales = (parseInt(p.minutosEstimados) || 15) * 60;
                
                htmlEstructuraTiempo = `
                    <div style="margin: 5px 0;">
                        <span style="font-size:13px; color:#a4b0be;">Tiempo de Arribo:</span>
                        <div class="cronometro" id="timer-${p.id}" data-segundos="${segundosTotales}">Calculando...</div>
                    </div>
                    <div style="font-size:12px; color:#a4b0be;" id="eta-hora-${p.id}">⏱️ ETA Arribo: ${p.horaLlegadaEstimada}</div>
                `;
            } else {
                // SI YA ESTÁ EN EL LOCAL DESDE EL INICIO
                if(p.pago === 'Efectivo') claseEspecial += " local-efectivo";
                badgeClase += " arribado";
                htmlEstructuraTiempo = `
                    <div style="font-size:13px; color:#2ed573; font-weight:bold; margin: 5px 0;">🟢 Cliente en el Local</div>
                    <div style="font-size:12px; color:#a4b0be;">⏱️ Ubicación: Inmediata</div>
                `;
            }

            div.className = claseEspecial;
            div.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; font-weight:bold; border-bottom:1px solid #4b5261; padding-bottom:8px;">
                    <span class="v-turno">TURNO #${p.turnoFila}</span>
                    <span style="font-size: 20px;">${p.tipo.includes('Remota') ? '🚗' : '🍽️'}</span>
                </div>
                <p style="margin:10px 0 3px 0; font-size: 15px;"><strong>Cliente:</strong> ${p.cliente}</p>
                
                <!-- Badge Dinámico de Estado Operativo -->
                <div id="status-badge-${p.id}" class="${badgeClase}">${estadoInicialTexto}</div>
                <div style="font-size:12px; color:#cbd5e1; margin-top:3px;">💳 Pago registrado: ${p.pago}</div>
                
                ${htmlEstructuraTiempo}

                <div style="background:#1e222b; padding:12px; border-radius:6px; margin:10px 0; font-size:15px; font-weight:bold; border-left:4px solid #ff4757;">
                    ${p.item}
                </div>

                <div style="font-size:11px; color:#a4b0be; text-align:right;">ID Orden: #${p.id} | Reg: ${p.horaRegistro}</div>
                <button class="btn-ready" onclick="despachar(${p.id})">✓ Pedido Entregado / Quitar</button>
            `;
            
            cont.prepend(div);
            
            // Activar el cronómetro si el pedido es una pre-orden
            if(p.esFantasma) {
                iniciarContadorRegresivo(p.id, p.pago);
            }

            // Sonido de alerta de nueva orden en cocina
            new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-600.wav').play().catch(() => {});
        });

        // FUNCIÓN DEL CRONÓMETRO DE ARRIBO AUTOMÁTICO
        function iniciarContadorRegresivo(idPedido, metodoPago) {
            const timerElemento = document.getElementById(`timer-${idPedido}`);
            if (!timerElemento) return;

            let segundosRestantes = parseInt(timerElemento.getAttribute('data-segundos'));

            intervalosCronometro[idPedido] = setInterval(() => {
                segundosRestantes--;

                if (segundosRestantes <= 0) {
                    // --- AQUÍ OCURRE LA MAGIA: EL TIEMPO LLEGÓ A CERO ---
                    clearInterval(intervalosCronometro[idPedido]);
                    delete intervalosCronometro[idPedido];

                    // 1. Cambiar el diseño de la tarjeta (De Pre-orden a Orden Activa en Local)
                    const tarjeta = document.getElementById(`kds-${idPedido}`);
                    if (tarjeta) {
                        tarjeta.classList.remove('pre-orden-espera');
                        tarjeta.classList.add('orden-activa-local');
                    }

                    // 2. Modificar el texto del cronómetro
                    timerElemento.innerText = "¡TIEMPO CUMPLIDO!";
                    timerElemento.style.color = "#2ed573";
                    timerElemento.style.background = "#ffffff";

                    // 3. Modificar el Texto y clase del Badge de Estado Gastronómico
                    const badge = document.getElementById(`status-badge-${idPedido}`);
                    if (badge) {
                        badge.className = "badge-estado arribado";
                        badge.innerText = (metodoPago === 'Tarjeta') ? "¡Orden Activa - Cliente en el Local! 🚨" : "¡Cliente en Local - Requiere Cobro! 💵";
                    }

                    // 4. Lanzar un sonido insistente para avisar que el cliente ya está en el local retirando
                    new Audio('https://assets.mixkit.co/active_storage/sfx/911/911-600.wav').play().catch(() => {});

                } else {
                    // Formatear los segundos a formato amigable MM:SS
                    const minutos = Math.floor(segundosRestantes / 60);
                    const segundos = segundosRestantes % 60;
                    timerElemento.innerText = `Llega en: ${minutos.toString().padStart(2, '0')}:${segundos.toString().padStart(2, '0')} min`;
                }
            }, 1000);
        }

        function despachar(id) {
            // Limpiar el intervalo de memoria si se elimina antes de tiempo
            if (intervalosCronometro[id]) {
                clearInterval(intervalosCronometro[id]);
                delete intervalosCronometro[id];
            }
            const el = document.getElementById(`kds-${id}`);
            if(el) { el.remove(); socket.emit('pedido-despachado-cocina', id); }
        }
    </script>
</body>
</html>
