<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Costeñita | Menú y Reservas</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0984e3">
    
    <script src="/socket.io/socket.io.js"></script>

    <style>
        :root {
            --ocean-blue: #0984e3;
            --coral: #e17055;
            --light: #f1f2f6;
            --dark: #2d3436;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            /* Tema Costeño: Filtro azul océano y fondo de mariscos simulado */
            background: linear-gradient(rgba(9, 132, 227, 0.8), rgba(45, 52, 54, 0.9)), url('https://images.unsplash.com/photo-1559742811-822873691fc8?auto=format&fit=crop&w=1920&q=80') center/cover fixed;
            color: var(--light);
            min-height: 100vh;
            padding-bottom: 80px;
        }
        
        /* Encabezado */
        header {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid var(--coral);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        header h1 {
            color: white;
            font-size: 28px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        header h1 span { color: var(--coral); }

        /* Controles (Sucursal, Búsqueda, Tipo de Orden) */
        .controls-container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        select, input[type="text"] {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(0,0,0,0.5);
            color: white;
            font-size: 16px;
        }

        /* Menú Dinámico */
        .menu-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        .categoria-titulo {
            font-size: 24px;
            color: var(--coral);
            margin: 30px 0 15px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 5px;
        }
        .grid-platos {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .plato-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            transition: transform 0.2s;
        }
        .plato-card:hover { transform: translateY(-5px); }
        .plato-foto {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .plato-precio {
            font-size: 20px;
            font-weight: bold;
            color: #55efc4;
            margin: 10px 0;
        }
        .plato-desc {
            font-size: 13px;
            color: #b2bec3;
            margin-bottom: 15px;
            min-height: 40px;
        }
        button.btn-add {
            background: var(--ocean-blue);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: 0.3s;
        }
        button.btn-add:hover { background: #74b9ff; }

        /* Modal del Carrito */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: var(--dark);
            width: 90%;
            max-width: 400px;
            padding: 25px;
            border-radius: 15px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }

        /* Asistente Costeñito (Chatbot Flotante) */
        .bot-bubble {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            background: var(--coral);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            cursor: pointer;
            z-index: 999;
            transition: transform 0.3s ease;
        }
        .bot-bubble:hover { transform: scale(1.1); }
        .chat-window {
            display: none;
            position: fixed;
            bottom: 90px;
            right: 20px;
            width: 320px;
            height: 400px;
            background: var(--light);
            color: var(--dark);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 999;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            background: var(--coral);
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
        }
        .chat-header span.close-chat { cursor: pointer; font-size: 20px; }
        .chat-body { flex: 1; padding: 15px; overflow-y: auto; background: #ffffff; }
        .chat-input { display: flex; padding: 10px; background: #dfe6e9; }
        .chat-input input { flex: 1; padding: 10px; border: none; border-radius: 5px; outline: none; color: black; }
        .chat-input button { background: var(--ocean-blue); color: white; border: none; padding: 10px 15px; margin-left: 5px; border-radius: 5px; cursor: pointer; }
        .msg-bot { background: #f1f2f6; padding: 10px; border-radius: 10px; margin-bottom: 10px; font-size: 14px; }
        .msg-user { background: var(--ocean-blue); color: white; padding: 10px; border-radius: 10px; margin-bottom: 10px; text-align: right; font-size: 14px; }

        /* Botón Flotante Carrito */
        .btn-flotante-carrito {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #55efc4;
            color: #2d3436;
            padding: 15px 25px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            border: none;
            z-index: 998;
        }
    </style>
</head>
<body>

    <header>
        <h1>La <span>Costeñita</span></h1>
        <p>Sabor 100% Ecuatoriano 🇪🇨</p>
    </header>

    <div class="controls-container">
        <select id="sucursalSelector" onchange="guardarSesion()">
            <option value="">📍 Selecciona una Sucursal...</option>
            <option value="Urdesa">La Costeñita - Urdesa</option>
            <option value="Samborondon">La Costeñita - Samborondón</option>
            <option value="Sur">La Costeñita - Sur</option>
        </select>

        <select id="tipoReserva" onchange="guardarSesion()">
            <option value="solo_reserva">🪑 Solo Reservar Mesa</option>
            <option value="pre_orden">👻 Reservar + Pre-orden (Pedido Fantasma)</option>
        </select>

        <input type="text" id="buscador" placeholder="🔍 Buscar encebollado, bolón..." onkeyup="filtrarMenu()">
    </div>

    <div class="menu-container" id="menuCatalogo">
        </div>

    <button class="btn-flotante-carrito" onclick="abrirCarrito()">🛒 Ver Mi Carrito (<span id="cartCount">0</span>)</button>

    <div class="modal" id="cartModal">
        <div class="modal-content">
            <h2 style="color: var(--coral); margin-bottom: 15px;">Tu Pedido</h2>
            <div id="cartItems"></div>
            <hr style="border-color: rgba(255,255,255,0.1); margin: 15px 0;">
            <h3>Total: $<span id="cartTotal">0.00</span></h3>
            
            <input type="text" id="nombreCliente" placeholder="Tu Nombre..." style="margin-top: 15px;">
            <select id="metodoPago" style="margin-top: 10px;">
                <option value="efectivo">💵 Pago en Efectivo (Caja)</option>
                <option value="tarjeta">💳 Pago con Tarjeta</option>
            </select>
            
            <button class="btn-add" style="margin-top: 20px; background: var(--coral);" onclick="enviarPedido()">🚀 CONFIRMAR ORDEN</button>
            <button class="btn-add" style="margin-top: 10px; background: transparent; border: 1px solid white;" onclick="cerrarCarrito()">Cancelar</button>
        </div>
    </div>

    <div class="bot-bubble" onclick="toggleBot()">🦀</div>
    <div class="chat-window" id="chatWindow">
        <div class="chat-header">
            Asistente Costeñito 🇪🇨
            <span class="close-chat" onclick="toggleBot()">✕</span>
        </div>
        <div class="chat-body" id="chatBody">
            <div class="msg-bot">¡Habla llave! Soy el Asistente Costeñito. Pregúntame sobre horarios, locales, reservas o si somos pet friendly. ¿En qué te ayudo?</div>
        </div>
        <div class="chat-input">
            <input type="text" id="chatInput" placeholder="Escribe aquí..." onkeypress="if(event.key === 'Enter') enviarMensajeBot()">
            <button onclick="enviarMensajeBot()">Enviar</button>
        </div>
    </div>

    <script>
        const socket = io();
        let menuActual = [];
        let carrito = [];

        // 💾 PERSISTENCIA: Cargar datos guardados si el usuario recarga la página
        window.onload = () => {
            if(sessionStorage.getItem('costenita_sucursal')) {
                document.getElementById('sucursalSelector').value = sessionStorage.getItem('costenita_sucursal');
            }
            if(sessionStorage.getItem('costenita_tipo_reserva')) {
                document.getElementById('tipoReserva').value = sessionStorage.getItem('costenita_tipo_reserva');
            }
            if(sessionStorage.getItem('costenita_carrito')) {
                carrito = JSON.parse(sessionStorage.getItem('costenita_carrito'));
                actualizarCarritoUI();
            }
        };

        function guardarSesion() {
            sessionStorage.setItem('costenita_sucursal', document.getElementById('sucursalSelector').value);
            sessionStorage.setItem('costenita_tipo_reserva', document.getElementById('tipoReserva').value);
            sessionStorage.setItem('costenita_carrito', JSON.stringify(carrito));
        }

        // 🍔 RECIBIR MENÚ Y RENDERIZAR DINÁMICAMENTE POR CATEGORÍAS
        socket.on('actualizar-menu', (platos) => {
            menuActual = platos;
            renderMenu(menuActual);
        });

        function renderMenu(platos) {
            const catalogo = document.getElementById('menuCatalogo');
            catalogo.innerHTML = '';

            // Extraer categorías únicas
            const categorias = [...new Set(platos.map(p => p.categoria))];

            categorias.forEach(cat => {
                // Título de la categoría
                let tituloCat = document.createElement('h2');
                tituloCat.className = 'categoria-titulo';
                tituloCat.innerText = cat.toUpperCase();
                catalogo.appendChild(tituloCat);

                // Contenedor Grid para los platos
                let grid = document.createElement('div');
                grid.className = 'grid-platos';

                const platosDeCategoria = platos.filter(p => p.categoria === cat);
                platosDeCategoria.forEach(plato => {
                    grid.innerHTML += `
                        <div class="plato-card">
                            <img src="${plato.foto}" alt="${plato.nombre}" class="plato-foto" onerror="this.src='https://via.placeholder.com/280x180?text=La+Costenita'">
                            <h3>${plato.nombre}</h3>
                            <p class="plato-desc">${plato.descripcion || 'Delicioso plato típico ecuatoriano.'}</p>
                            <p class="plato-precio">$${parseFloat(plato.precio).toFixed(2)}</p>
                            <button class="btn-add" onclick="agregarAlCarrito(${plato.id}, '${plato.nombre}', ${plato.precio})">
                                + Agregar
                            </button>
                        </div>
                    `;
                });
                catalogo.appendChild(grid);
            });
        }

        // 🔍 FILTRO DE BÚSQUEDA
        function filtrarMenu() {
            const texto = document.getElementById('buscador').value.toLowerCase();
            const filtrados = menuActual.filter(p => p.nombre.toLowerCase().includes(texto) || (p.descripcion && p.descripcion.toLowerCase().includes(texto)));
            renderMenu(filtrados);
        }

        // 🛒 LÓGICA DEL CARRITO
        function agregarAlCarrito(id, nombre, precio) {
            carrito.push({ id, nombre, precio });
            guardarSesion();
            actualizarCarritoUI();
            
            // Animación visual del botón flotante
            const btn = document.querySelector('.btn-flotante-carrito');
            btn.style.transform = 'scale(1.2)';
            setTimeout(() => btn.style.transform = 'scale(1)', 200);
        }

        function actualizarCarritoUI() {
            document.getElementById('cartCount').innerText = carrito.length;
            const itemsDiv = document.getElementById('cartItems');
            itemsDiv.innerHTML = '';
            
            let total = 0;
            carrito.forEach((item, index) => {
                total += parseFloat(item.precio);
                itemsDiv.innerHTML += `
                    <div class="cart-item">
                        <span>${item.nombre}</span>
                        <span>$${parseFloat(item.precio).toFixed(2)} <button style="background:transparent; border:none; color:red; cursor:pointer;" onclick="quitarDelCarrito(${index})">✕</button></span>
                    </div>
                `;
            });
            document.getElementById('cartTotal').innerText = total.toFixed(2);
        }

        function quitarDelCarrito(index) {
            carrito.splice(index, 1);
            guardarSesion();
            actualizarCarritoUI();
        }

        function abrirCarrito() { document.getElementById('cartModal').style.display = 'flex'; }
        function cerrarCarrito() { document.getElementById('cartModal').style.display = 'none'; }

        // 🚀 ENVÍO DEL PEDIDO / RESERVA
        function enviarPedido() {
            const sucursal = document.getElementById('sucursalSelector').value;
            const tipo = document.getElementById('tipoReserva').value;
            const nombre = document.getElementById('nombreCliente').value;
            const pago = document.getElementById('metodoPago').value;

            if(!sucursal) return alert("Por favor, selecciona una sucursal arriba.");
            if(!nombre) return alert("Por favor, escribe tu nombre.");
            if(tipo === 'pre_orden' && carrito.length === 0) return alert("Tu carrito está vacío. Agrega platos o cambia a 'Solo Reservar'.");

            const nuevoPedido = {
                sucursal: sucursal,
                cliente: nombre,
                tipo_orden: tipo, // 'solo_reserva' o 'pre_orden'
                pago: pago,
                estado: tipo === 'pre_orden' ? 'fantasma' : 'pendiente', // 👻
                items: carrito,
                total: document.getElementById('cartTotal').innerText,
                horaRegistro: new Date().toLocaleTimeString('es-EC', { timeZone: 'America/Guayaquil' })
            };

            socket.emit('nuevo-pedido', nuevoPedido);
            
            // Limpieza y alerta de éxito
            carrito = [];
            guardarSesion();
            actualizarCarritoUI();
            cerrarCarrito();
            
            alert(`¡Bacán, ${nombre}! Tu solicitud fue enviada a la sucursal de ${sucursal}. Te esperamos.`);
        }

        // 🤖 LÓGICA DEL BOT COSTEÑITO (9 Temas)
        function toggleBot() {
            const chat = document.getElementById('chatWindow');
            chat.style.display = (chat.style.display === 'flex') ? 'none' : 'flex';
        }

        function enviarMensajeBot() {
            const input = document.getElementById('chatInput');
            const texto = input.value.trim();
            if(!texto) return;

            const chatBody = document.getElementById('chatBody');
            
            // Imprimir mensaje del usuario
            chatBody.innerHTML += `<div class="msg-user">${texto}</div>`;
            input.value = '';
            
            // Lógica de palabras clave
            setTimeout(() => {
                let respuesta = "Chuta, no te caché bien la pregunta. Prueba preguntando por horarios, locales, menú o si aceptamos mascotas.";
                const t = texto.toLowerCase();

                if(t.includes("hola") || t.includes("saludos") || t.includes("buenas")) {
                    respuesta = "¡Habla mi llave! Bienvenido a La Costeñita. ¿Qué se te ofrece hoy?";
                } else if (t.includes("ubicacion") || t.includes("direccion") || t.includes("donde")) {
                    respuesta = "📍 Estamos en 3 lados: Urdesa (Víctor Emilio), Samborondón (Plaza Lagos) y el Sur (La Saiba).";
                } else if (t.includes("hora") || t.includes("abren") || t.includes("cierran")) {
                    respuesta = "🕒 Atendemos todos los días desde las 08:00 AM hasta las 11:00 PM.";
                } else if (t.includes("perro") || t.includes("mascota") || t.includes("pet")) {
                    respuesta = "🐶 ¡Claro que sí! Somos 100% Pet Friendly en las terrazas de Urdesa y Samborondón.";
                } else if (t.includes("parqueo") || t.includes("estacionamiento")) {
                    respuesta = "🚗 Tranquilo, tenemos parqueo privado y guardia en todos nuestros locales.";
                } else if (t.includes("pago") || t.includes("tarjeta") || t.includes("efectivo")) {
                    respuesta = "💳 Aceptamos efectivo, transferencias, y todas las tarjetas de crédito o débito.";
                } else if (t.includes("menu") || t.includes("comida") || t.includes("platos") || t.includes("encebollado")) {
                    respuesta = "🍲 Cerramos el navegador y mira el menú de fondo, ¡tenemos los mejores encebollados y bolones de la ciudad!";
                } else if (t.includes("reserva") || t.includes("mesa")) {
                    respuesta = "🪑 Puedes reservar tu mesa directo arriba seleccionando tu sucursal. ¡Pilas que se llenan!";
                } else if (t.includes("domicilio") || t.includes("delivery") || t.includes("llevar")) {
                    respuesta = "🛵 Por ahora puedes hacer tu pedido web y pasar retirando. ¡Pronto tendremos delivery propio!";
                }

                chatBody.innerHTML += `<div class="msg-bot">${respuesta}</div>`;
                chatBody.scrollTop = chatBody.scrollHeight; // Auto-scroll
            }, 600);
        }
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('✅ Service Worker de La Costeñita registrado.', reg))
                    .catch(err => console.error('❌ Error al registrar el Service Worker', err));
            });
        }
    </script>
</body>
</html>
