<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frank's Burgers - Quiosco Omnicanal</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #f8f9fa; display: flex; height: 100vh; color: #333; }
        
        .menu-container { width: 65%; padding: 25px; overflow-y: auto; height: 100%; }
        .header { margin-bottom: 25px; border-bottom: 3px solid #ff4757; padding-bottom: 10px; }
        .header h1 { color: #ff4757; font-size: 28px; }
        
        .seccion-titulo { margin: 20px 0 10px 0; color: #2f3542; font-size: 20px; border-left: 5px solid #ffa502; padding-left: 10px; }
        .grid-productos { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        
        .card-producto { background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); overflow: hidden; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid #eee; }
        .card-producto img { width: 100%; height: 130px; object-fit: cover; }
        .card-producto.agotado { opacity: 0.5; }
        .card-producto.agotado img { filter: grayscale(1); }

        .info-producto { padding: 12px; }
        .info-producto h3 { font-size: 16px; margin-bottom: 5px; color: #2f3542; }
        .info-producto p { font-size: 14px; color: #ff4757; font-weight: bold; margin-bottom: 10px; }
        
        .btn-agregar { background: #ff4757; color: white; border: none; width: 100%; padding: 8px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-agregar:disabled { background: #a4b0be !important; cursor: not-allowed; }

        .checkout-container { width: 35%; background: white; border-left: 1px solid #e0e0e0; padding: 25px; display: flex; flex-direction: column; height: 100%; overflow-y: auto; }
        .checkout-container h2 { margin-bottom: 15px; color: #2f3542; border-bottom: 2px solid #f1f2f6; padding-bottom: 10px; }
        
        .lista-carrito { flex-grow: 1; min-height: 100px; margin-bottom: 15px; }
        .item-carrito { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px dashed #eee; font-size: 14px; }
        .btn-eliminar { background: none; border: none; color: #ff4757; cursor: pointer; font-weight: bold; }
        
        .total-box { background: #f1f2f6; padding: 15px; border-radius: 8px; font-size: 18px; font-weight: bold; display: flex; justify-content: space-between; margin-bottom: 15px; }
        
        .form-grupo { margin-bottom: 12px; }
        .form-grupo label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; color: #57606f; }
        .form-grupo input, .form-grupo select { width: 100%; padding: 10px; border: 1px solid #ced4da; border-radius: 6px; font-size: 14px; }
        
        .opciones-flex { display: flex; gap: 8px; margin-bottom: 5px; }
        .radio-btn { flex: 1; text-align: center; padding: 10px 5px; border: 2px solid #ced4da; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 12px; }
        .radio-btn.active { border-color: #2ed573; background: #e8fcf0; color: #2ed573; }
        
        .box-tiempo { background: #fff2cc; border: 1px solid #ffd966; padding: 10px; border-radius: 6px; margin-top: 5px; display: none; }
        .btn-finalizar { background: #2ed573; color: white; border: none; width: 100%; padding: 15px; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        @media (max-width: 768px) {
            body { flex-direction: column; height: auto; }
            .menu-container { width: 100%; }
            .checkout-container { width: 100%; border-left: none; border-top: 3px solid #ff4757; }
        }
    </style>
</head>
<body>

    <div class="menu-container">
        <div class="header">
            <h1>🍔 Quiosco Frank's Burgers</h1>
            <p>Control de Disponibilidad en Tiempo Real e Innovación en Pre-órdenes</p>
        </div>
        <div class="seccion-titulo">Nuestros Combos del Día</div>
        <div class="grid-productos" id="menu-combos"></div>
        <div class="seccion-titulo">Bebidas y Extras</div>
        <div class="grid-productos" id="menu-bebidas"></div>
    </div>

    <div class="checkout-container">
        <h2>Tu Pedido</h2>
        <div class="lista-carrito" id="carrito-items">
            <p style="color: #999; text-align: center; margin-top: 20px;">El carrito está vacío</p>
        </div>
        <div class="total-box">
            <span>Total:</span>
            <span id="total-precio">$0.00</span>
        </div>
        
        <div class="form-grupo">
            <label>¿A nombre de quién?</label>
            <input type="text" id="cliente-nombre" placeholder="Escribe tu nombre">
        </div>

        <div class="form-grupo">
            <label>Modalidad de Orden</label>
            <div class="opciones-flex">
                <div class="radio-btn active" id="opt-aqui" onclick="setEntrega('Comer Aquí')">En Local 🍽️</div>
                <div class="radio-btn" id="opt-llevar" onclick="setEntrega('Para Llevar')">Llevar 🛍️</div>
                <div class="radio-btn" id="opt-fantasma" onclick="setEntrega('Pre-orden Remota 👻')">En Camino 👻</div>
            </div>
            <div class="box-tiempo" id="contenedor-tiempo-fantasma">
                <label style="color: #b45f06;">¿En cuántos minutos llegas al local?</label>
                <input type="number" id="tiempo-arribo" value="15" min="5" style="border-color:#ffd966;">
            </div>
        </div>

        <div class="form-grupo">
            <label>Método de Pago</label>
            <select id="metodo-pago">
                <option value="Tarjeta (Pagado)">💳 Tarjeta de Crédito/Débito (Pago en Web)</option>
                <option value="Efectivo (Pendiente)">💵 Efectivo (Validar en Caja)</option>
            </select>
        </div>

        <div class="form-grupo">
            <label>Instrucciones de Cocina</label>
            <input type="text" id="cliente-notes" placeholder="Ej. Sin cebolla, papas bien crocantes...">
        </div>
        
        <button class="btn-finalizar" onclick="procesarPedido()">ENVIAR ORDEN 🚀</button>
    </div>

    <script>
        const socket = io();
        let productos = [];
        let carrito = [];
        let modalidadPedido = "Comer Aquí";

        socket.on('cargar-menu-inicial', (menuServidor) => { productos = menuServidor; cargarMenu(); });
        
        socket.on('menu-actualizado-completo', (menuServidor) => {
            productos = menuServidor;
            carrito.forEach(item => {
                const prodSrv = productos.find(p => p.id === item.id);
                if (prodSrv && item.cantidad > prodSrv.stock) {
                    item.cantidad = prodSrv.stock;
                }
            });
            carrito = carrito.filter(item => item.cantidad > 0);
            cargarMenu();
            actualizarInterfazCarrito();
        });

        function cargarMenu() {
            const contenedorCombos = document.getElementById('menu-combos');
            const contenedorBebidas = document.getElementById('menu-bebidas');
            
            contenedorCombos.innerHTML = "";
            contenedorBebidas.innerHTML = "";

            if(productos.length === 0) {
                contenedorCombos.innerHTML = "<p style='color:#999; padding: 10px;'>No hay productos habilitados.</p>";
                return;
            }

            productos.forEach(p => {
                const tieneStock = p.stock > 0;
                let stockTexto = `<span style="color:#2ed573; font-size:12px; font-weight:bold; display:block; margin-bottom:8px;">🟢 Disponibles: ${p.stock} un.</span>`;
                
                if(p.stock <= 3 && p.stock > 0) {
                    stockTexto = `<span style="color:#ff4757; font-size:12px; font-weight:bold; display:block; margin-bottom:8px;">🔥 ¡Solo quedan ${p.stock}!</span>`;
                } else if(p.stock === 0) {
                    stockTexto = `<span style="color:#a4b0be; font-size:12px; font-weight:bold; display:block; margin-bottom:8px;">❌ Agotado por hoy</span>`;
                }

                const html = `
                    <div class="card-producto ${tieneStock ? '' : 'agotado'}">
                        <img src="${p.img}">
                        <div class="info-producto">
                            <h3>${p.nombre}</h3>
                            <p>$${p.precio.toFixed(2)}</p>
                            ${stockTexto}
                            <button class="btn-agregar" onclick="agregarAlCarrito(${p.id})" ${tieneStock ? '' : 'disabled'}>
                                ${tieneStock ? 'Agregar +' : 'Agotado'}
                            </button>
                        </div>
                    </div>`;
                
                if(p.category === "combos") contenedorCombos.innerHTML += html;
                else contenedorBebidas.innerHTML += html;
            });
        }

        function agregarAlCarrito(id) {
            const producto = productos.find(p => p.id === id);
            if (!producto || producto.stock <= 0) return;

            const existe = carrito.find(item => item.id === id);
            if (existe) {
                if(existe.cantidad < producto.stock) {
                    existe.cantidad++;
                } else {
                    alert(`Solo nos quedan ${producto.stock} raciones de este menú.`);
                }
            } else {
                carrito.push({ ...producto, cantidad: 1 });
            }
            actualizarInterfazCarrito();
        }

        function eliminarDelCarrito(id) {
            carrito = carrito.filter(item => item.id !== id);
            actualizarInterfazCarrito();
        }

        function actualizarInterfazCarrito() {
            const contenedor = document.getElementById('carrito-items');
            const totalTxt = document.getElementById('total-precio');
            if (carrito.length === 0) {
                contenedor.innerHTML = `<p style="color: #999; text-align: center; margin-top: 20px;">El carrito está vacío</p>`;
                totalTxt.innerText = "$0.00";
                return;
            }
            contenedor.innerHTML = "";
            let total = 0;
            carrito.forEach(item => {
                total += item.precio * item.cantidad;
                contenedor.innerHTML += `
                    <div class="item-carrito">
                        <div><strong>${item.cantidad}x</strong> ${item.nombre}</div>
                        <div>
                            <span>$${(item.precio * item.cantidad).toFixed(2)}</span>
                            <button class="btn-eliminar" onclick="eliminarDelCarrito(${item.id})">❌</button>
                        </div>
                    </div>`;
            });
            totalTxt.innerText = `$${total.toFixed(2)}`;
        }

        function setEntrega(tipo) {
            modalidadPedido = tipo;
            document.getElementById('opt-aqui').classList.toggle('active', tipo === 'Comer Aquí');
            document.getElementById('opt-llevar').classList.toggle('active', tipo === 'Para Llevar');
            document.getElementById('opt-fantasma').classList.toggle('active', tipo === 'Pre-orden Remota 👻');
            
            // Mostrar u ocultar el input de tiempo de llegada estimado
            document.getElementById('contenedor-tiempo-fantasma').style.display = (tipo === 'Pre-orden Remota 👻') ? 'block' : 'none';
        }

        function procesarPedido() {
            const nombre = document.getElementById('cliente-nombre').value.trim();
            const pago = document.getElementById('metodo-pago').value;
            const notas = document.getElementById('cliente-notes').value.trim();

            if (carrito.length === 0) return alert("El carrito está vacío.");
            if (!nombre) return alert("Por favor ingresa tu nombre.");

            const listaItemsTexto = carrito.map(i => `${i.cantidad}x ${i.nombre}`).join(', ');
            const productosComprados = carrito.map(i => ({ id: i.id, cantidad: i.cantidad }));

            const pedidoFinal = {
                id: Math.floor(Math.random() * 9000) + 1000, 
                cliente: nombre,
                item: listaItemsTexto,
                tipo: modalidadPedido,
                pago: pago,
                notes: notas || "Ninguna",
                productosComprados: productosComprados 
            };

            if (modalidadPedido === 'Pre-orden Remota 👻') {
                pedidoFinal.minutosEstimados = parseInt(document.getElementById('tiempo-arribo').value) || 15;
                socket.emit('enviar-preorden-fantasma', pedidoFinal);
                alert(`👻 ¡Pre-orden Fantasma #${pedidoFinal.id} enviada! Tu plato se marchará preventivamente.`);
            } else {
                socket.emit('enviar-pedido', pedidoFinal);
                alert(`🚀 ¡Pedido #${pedidoFinal.id} enviado con éxito!`);
            }
            
            carrito = [];
            document.getElementById('cliente-nombre').value = "";
            document.getElementById('cliente-notes').value = "";
            actualizarInterfazCarrito();
        }
    </script>
</body>
</html>
