<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Costeñita - Quiosco</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #e0f7fa; margin: 0; padding: 20px; }
        .tarjeta-blanca { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); max-width: 600px; margin: 0 auto 20px auto; }
        h1, h2 { color: #005f73; text-align: center; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .btn-primario { background: #ff9800; color: white; border: none; padding: 15px; border-radius: 25px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; }
        .btn-primario:disabled { background: #ccc; cursor: not-allowed; }
        .grid-menu { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .producto-card { border: 1px solid #eee; padding: 15px; border-radius: 10px; text-align: center; }
        .info-mesas { background: #d4edda; color: #155724; padding: 10px; border-radius: 8px; font-weight: bold; text-align: center; display: none; }
        
        /* Pantalla Turno Tipo Hospital */
        #pantalla-hospital { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 95, 115, 0.95); color: white; z-index: 10000; text-align: center; padding-top: 20vh; }
        .turno-gigante { font-size: 100px; color: #ff9800; font-weight: 900; margin: 20px 0; animation: parpadeo 1s infinite alternate; }
        @keyframes parpadeo { from { opacity: 1; } to { opacity: 0.5; } }
    </style>
</head>
<body>

<div id="seccion-reserva" class="tarjeta-blanca">
    <h1>🦀 La Costeñita</h1>
    <p style="text-align:center;">Paso 1: Disponibilidad y Reserva</p>
    
    <label>📍 Sucursal:</label>
    <select id="sucursal" onchange="verificarMesas()">
        <option value="Urdesa">Urdesa Central</option>
        <option value="Samborondon">Plaza Samborondón</option>
        <option value="Sur">Sur</option>
    </select>

    <label>📅 Fecha:</label>
    <input type="date" id="fecha-reserva" onchange="verificarMesas()">

    <label>⏰ Hora:</label>
    <input type="time" id="hora-reserva" onchange="verificarMesas()">

    <label>👥 Personas:</label>
    <select id="personas" onchange="verificarMesas()">
        <option value="2">2 Personas</option>
        <option value="4">4 Personas</option>
        <option value="6">6 Personas</option>
        <option value="8">8+ Personas</option>
    </select>

    <div id="info-mesas" class="info-mesas"></div>

    <button id="btn-preorden" class="btn-primario" style="background:#2ecc71;" onclick="avanzarMenu()" disabled>🍔 Continuar a Pre-orden</button>
</div>

<div id="seccion-menu" class="tarjeta-blanca" style="display: none;">
    <button onclick="volverReserva()" style="background:#ccc; border:none; padding:10px; border-radius:10px; cursor:pointer;">⬅ Volver</button>
    <h2>Menú del Día</h2>
    <div id="catalogo-menu" class="grid-menu"></div>
    
    <hr>
    <h3>Tu Datos y Pago</h3>
    <input type="text" id="nombre-cliente" placeholder="Tu Nombre">
    <button class="btn-primario" onclick="enviarPedido()">🚀 Confirmar Pedido y Generar Turno</button>
</div>

<div id="pantalla-hospital">
    <h2>🔔 ATENCIÓN</h2>
    <p style="font-size: 24px;">El siguiente turno está listo en cocina:</p>
    <div id="turno-anuncio" class="turno-gigante">--</div>
    <p>Por favor, retira tu pedido o infórmale a tu mesero.</p>
    <button onclick="cerrarHospital()" style="padding:15px 30px; border-radius:20px; border:none; font-size:18px; cursor:pointer; margin-top:30px;">Entendido</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let carrito = [];
    let reservaActual = { mesa_id: null, sucursal: '', fecha: '', hora: '' };

    // 1. Bloquear fechas pasadas al cargar la página
    window.onload = () => {
        const hoy = new Date().toISOString().split('T')[0];
        document.getElementById('fecha-reserva').setAttribute('min', hoy);
        socket.emit('pedir-menu');
    };

    // 2. Verificar Mesas en tiempo real
    function verificarMesas() {
        const sucursal = document.getElementById('sucursal').value;
        const fecha = document.getElementById('fecha-reserva').value;
        const hora = document.getElementById('hora-reserva').value;
        const personas = document.getElementById('personas').value;

        if(sucursal && fecha && hora && personas) {
            reservaActual = { sucursal, fecha, hora, mesa_id: null };
            socket.emit('consultar-disponibilidad', {sucursal, fecha, hora, personas});
        }
    }

    socket.on('respuesta-disponibilidad', (mesasLibres) => {
        const info = document.getElementById('info-mesas');
        const btn = document.getElementById('btn-preorden');
        
        info.style.display = 'block';
        if(mesasLibres.length > 0) {
            info.style.background = '#d4edda';
            info.style.color = '#155724';
            info.innerHTML = `✅ ¡Hay ${mesasLibres.length} mesas disponibles! Te hemos asignado la Mesa #${mesasLibres[0].numero}`;
            reservaActual.mesa_id = mesasLibres[0].id;
            btn.disabled = false; // DESBLOQUEA LA TRANSICIÓN
        } else {
            info.style.background = '#f8d7da';
            info.style.color = '#721c24';
            info.innerHTML = `❌ Lo sentimos, no hay mesas para esta cantidad de personas a esta hora.`;
            reservaActual.mesa_id = null;
            btn.disabled = true; // BLOQUEA LA TRANSICIÓN
        }
    });

    // 3. Transición de Pantallas (Solución al error de no direccionar)
    function avanzarMenu() {
        document.getElementById('seccion-reserva').style.display = 'none';
        document.getElementById('seccion-menu').style.display = 'block';
    }

    function volverReserva() {
        document.getElementById('seccion-menu').style.display = 'none';
        document.getElementById('seccion-reserva').style.display = 'block';
    }

    // 4. Renderizar Menú y Carrito
    socket.on('actualizar-menu', (menu) => {
        const contenedor = document.getElementById('catalogo-menu');
        contenedor.innerHTML = '';
        menu.forEach(p => {
            contenedor.innerHTML += `
                <div class="producto-card">
                    <h4>${p.nombre}</h4>
                    <p style="color:red; font-weight:bold;">$${p.precio}</p>
                    <button onclick="agregar('${p.nombre}', ${p.precio})">Agregar</button>
                </div>
            `;
        });
    });

    function agregar(nombre, precio) {
        carrito.push({nombre, precio});
        alert(`${nombre} agregado a tu pre-orden.`);
    }

    // 5. Generar Turno y Enviar
    function enviarPedido() {
        const cliente = document.getElementById('nombre-cliente').value;
        if(!cliente) return alert("Ingresa tu nombre");

        socket.emit('nuevo-pedido', {
            cliente: cliente,
            reserva: reservaActual,
            items: carrito,
            total: carrito.reduce((sum, i) => sum + i.precio, 0)
        });
    }

    socket.on('pedido-confirmado', (turno) => {
        alert(`¡Reserva y Pedido Confirmado!\nTU TURNO ES: ${turno}`);
        window.location.reload();
    });

    // 6. SISTEMA DE TURNOS TIPO HOSPITAL
    socket.on('turno-listo-hospital', (turnoAnunciado) => {
        document.getElementById('pantalla-hospital').style.display = 'block';
        document.getElementById('turno-anuncio').innerText = turnoAnunciado;
        // Opcional: Reproducir sonido de campana
    });

    function cerrarHospital() {
        document.getElementById('pantalla-hospital').style.display = 'none';
    }
</script>
</body>
</html>
