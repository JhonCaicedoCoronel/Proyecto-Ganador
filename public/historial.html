<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Historial de Ventas - J & J</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #f1f2f6; color: #2f3542; padding-bottom: 30px; }
        
        .nav-admin { background: #2f3542; padding: 15px 20px; display: flex; gap: 15px; justify-content: center; margin-bottom: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.15); flex-wrap: wrap; }
        .nav-admin a { text-decoration: none; font-weight: bold; padding: 10px 20px; border-radius: 8px; transition: 0.2s; font-size: 15px; }
        .nav-activo { background: #ff4757; color: white; box-shadow: 0 2px 5px rgba(255,71,87,0.4); }
        .nav-inactivo { background: rgba(255,255,255,0.1); color: white; }
        .nav-inactivo:hover { background: rgba(255,255,255,0.2); }
        .nav-link { color: #2ed573; border: 1px solid #2ed573; margin-left: auto; }
        .nav-link:hover { background: #2ed573; color: white; }

        .container { padding: 0 30px; }
        table { width: 100%; background: white; border-collapse: collapse; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; font-size: 14px; }
        th { background: #2f3542; color: white; }
        .badge { background: #2ed573; color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

    <nav class="nav-admin">
        <a href="/admin.html" class="nav-inactivo">🍔 Editor de Menú</a>
        <a href="/mesas.html" class="nav-inactivo">🪑 Monitor de Mesas</a>
        <a href="/cocina.html" class="nav-inactivo">👨‍🍳 Pantalla Cocina</a>
        <a href="/historial.html" class="nav-activo">📈 Historial Ventas</a>
        <a href="/quiosco.html" target="_blank" class="nav-link">👀 Ver Quiosco Cliente ↗</a>
    </nav>

    <div class="container">
        <h1 style="margin-bottom: 25px;">📊 Historial de Pedidos Entregados</h1>
        
        <table>
            <thead>
                <tr>
                    <th>ID Orden</th>
                    <th>Cliente</th>
                    <th>Artículos Preparados</th>
                    <th>Mesa / Modalidad</th>
                    <th>Pago</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody id="tabla-historial">
                <tr><td colspan="6" style="text-align:center; color:#999;">Cargando historial desde la nube...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        const socket = io();

        function pedirHistorial() { socket.emit('obtener-historial-dia'); }
        socket.on('connect', pedirHistorial);
        if (socket.connected) pedirHistorial();

        socket.on('cargar-historial', (pedidosEntregados) => {
            const tbody = document.getElementById('tabla-historial');
            tbody.innerHTML = "";

            if (pedidosEntregados.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; color:#999;">Aún no se han entregado pedidos.</td></tr>`;
                return;
            }

            pedidosEntregados.forEach(p => {
                const mesaTexto = p.datos_reserva ? `Mesa #${p.datos_reserva.mesa.numero}` : "Barra";
                tbody.innerHTML += `
                    <tr>
                        <td><strong>#${p.id}</strong></td>
                        <td>${p.cliente}</td>
                        <td>${p.item}</td>
                        <td>${mesaTexto}</td>
                        <td>${p.pago}</td>
                        <td><span class="badge">✅ Entregado</span></td>
                    </tr>
                `;
            });
        });
    </script>
</body>
</html>
