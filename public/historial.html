<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Historial de Ventas</title>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        if (!sessionStorage.getItem('usuarioLogueado')) {
            window.top.location.href = '/login.html';
        }
    </script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f6f8; padding: 30px; color: #2f3542; margin: 0; }
        h1 { margin-bottom: 25px; text-align: center; color: #2f3542; }
        table { width: 100%; background: white; border-collapse: collapse; border-radius: 12px; overflow: hidden; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #f1f2f6; font-size: 14px; }
        th { background: #2f3542; color: white; text-transform: uppercase; font-size: 13px; }
        .badge { background: #2ed573; color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>📈 Historial de Platos Despachados</h1>

    <table>
        <thead>
            <tr>
                <th>ID Orden</th>
                <th>Cliente</th>
                <th>Artículos Preparados</th>
                <th>Pago / Modalidad</th>
                <th>Estado</th>
            </tr>
        </thead>
        <tbody id="tabla-historial">
            <tr><td colspan="5" style="text-align:center; padding: 20px;">Cargando ventas...</td></tr>
        </tbody>
    </table>

    <script>
        const socket = io();
        const miTenant = sessionStorage.getItem('tenant_id');

        socket.on('connect', () => {
            if (miTenant) {
                socket.emit('unirse-a-restaurante', miTenant);
                socket.emit('obtener-historial-dia', tenantIdActual);
            } else {
                window.top.location.href = '/login.html';
            }
        });

        socket.on('cargar-historial', (pedidos) => {
            const tbody = document.getElementById('tabla-historial'); tbody.innerHTML = "";
            if (pedidos.length === 0) { tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:#999; padding: 20px;">Aún no se han despachado pedidos.</td></tr>`; return; }

            pedidos.forEach(p => {
                tbody.innerHTML += `
                    <tr>
                        <td><strong>#${p.id}</strong></td>
                        <td>${p.cliente}</td>
                        <td>${p.item}</td>
                        <td>${p.pago}</td>
                        <td><span class="badge">✅ Entregado</span></td>
                    </tr>`;
            });
        });
    </script>
</body>
</html>
