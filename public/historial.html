<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Historial de Ventas y Despachos</title>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        if (!sessionStorage.getItem('usuarioLogueado')) {
            window.top.location.href = '/login.html';
        }
    </script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f6f8; padding: 30px; color: #2f3542; margin: 0; }
        h1 { margin-bottom: 25px; text-align: center; color: #2f3542; }
        table { width: 100%; background: white; border-collapse: collapse; border-radius: 12px; overflow: hidden; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #f1f2f6; font-size: 14px; }
        th { background: #2f3542; color: white; text-transform: uppercase; font-size: 13px; }
        .badge { background: #2ed573; color: white; padding: 6px 10px; border-radius: 6px; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>📈 Historial de Pre-Órdenes Despachadas</h1>

    <table>
        <thead>
            <tr>
                <th>ID Pedido</th>
                <th>Cliente</th>
                <th>Resumen de la Orden</th>
                <th>Sucursal</th>
                <th>Tipo de Pago</th>
                <th>Estado</th>
            </tr>
        </thead>
        <tbody id="tabla-historial">
            <tr><td colspan="6" style="text-align:center; color:#999; padding: 20px; font-size:16px;">Sincronizando registros con Supabase...</td></tr>
        </tbody>
    </table>

    <script>
        const socket = io();
        
        let miTenant = sessionStorage.getItem('tenant_id');
        if (!miTenant || miTenant === "null" || miTenant === "undefined") {
            miTenant = 'tenant_costenita';
            sessionStorage.setItem('tenant_id', miTenant);
        }

        socket.on('connect', () => {
            console.log("Conectado al servidor de historial, sincronizando local:", miTenant);
            socket.emit('unirse-a-restaurante', miTenant);
            socket.emit('obtener-historial-dia', miTenant); // Consulta reactiva sin errores
        });

        socket.on('cargar-historial', (pedidos) => {
            const tbody = document.getElementById('tabla-historial'); 
            tbody.innerHTML = "";
            
            if (!pedidos || pedidos.length === 0) { 
                tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; color:#999; padding: 20px; font-size:16px;">Aún no se han despachado pedidos en este local el día de hoy.</td></tr>`; 
                return; 
            }

            pedidos.forEach(p => {
                const sucursal = p.sucursal || (p.datos_reserva && p.datos_reserva.sucursal) || 'Urdesa';
                tbody.innerHTML += `
                    <tr>
                        <td><strong>#${p.id}</strong></td>
                        <td>${p.cliente}</td>
                        <td>${p.item}</td>
                        <td>🏢 ${sucursal}</td>
                        <td>${p.pago || 'Tarjeta'}</td>
                        <td><span class="badge">✅ Entregado / Despachado</span></td>
                    </tr>`;
            });
        });
    </script>
</body>
</html>
