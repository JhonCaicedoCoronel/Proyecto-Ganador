<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Libro de Reservas</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f6f8; padding: 30px; color: #2f3542; margin: 0; }
        h1 { margin-bottom: 25px; text-align: center; color: #2f3542; }
        table { width: 100%; background: white; border-collapse: collapse; border-radius: 12px; overflow: hidden; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #f1f2f6; font-size: 14px; }
        th { background: #2f3542; color: white; text-transform: uppercase; font-size: 13px; }
        .badge-activa { background: #e8fcf0; color: #2ed573; padding: 6px 12px; border-radius: 20px; font-weight: bold; border: 1px solid #2ed573; display: inline-block;}
        .badge-final { background: #f1f2f6; color: #a4b0be; padding: 6px 12px; border-radius: 20px; font-weight: bold; display: inline-block; }
        .btn-salida { background: #e15f41; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-salida:hover { background: #c44527; transform: scale(1.05); }
        .txt-salida { font-size: 13px; color: #57606f; font-weight: bold; }
    </style>
</head>
<body>

    <h1>📅 Libro Global de Reservas</h1>

    <table>
        <thead>
            <tr>
                <th>Llegada</th>
                <th>Cliente</th>
                <th>Sucursal y Mesa</th>
                <th>Estado Actual</th>
                <th>Check-out (Desocupar)</th>
            </tr>
        </thead>
        <tbody id="tabla-reservas">
            <tr><td colspan="5" style="text-align:center; padding: 20px;">Cargando...</td></tr>
        </tbody>
    </table>

    <script>
        const socket = io();
        socket.on('connect', () => socket.emit('obtener-historial-reservas'));

        socket.on('cargar-historial-reservas', (reservas) => {
            const tbody = document.getElementById('tabla-reservas'); tbody.innerHTML = "";
            if (reservas.length === 0) { tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:#999; padding: 20px;">No hay reservas registradas.</td></tr>`; return; }

            reservas.forEach(r => {
                let estadoHTML = (r.estado === 'activa' || !r.estado) ? `<span class="badge-activa">🟢 Fila: Turno #${r.turno_sala}</span>` : `<span class="badge-final">⚪ Finalizada</span>`;
                let accionHTML = (r.estado === 'activa' || !r.estado) ? `<button class="btn-salida" onclick="marcarSalida(${r.id}, ${r.mesa_id})">🚪 Desocupó Mesa</button>` : `<span class="txt-salida">Salió a las: ${r.hora_salida}</span>`;
                let sucursalTxt = r.sucursal ? r.sucursal : "Urdesa";

                tbody.innerHTML += `
                    <tr>
                        <td><strong>${r.fecha}</strong><br><span style="color:#a4b0be; font-size:12px;">Para las ${r.hora}</span></td>
                        <td><strong style="font-size:16px;">${r.cliente}</strong><br>👤 ${r.personas} Personas</td>
                        <td><strong style="color:#0a3d62;">🏢 ${sucursalTxt}</strong><br>Mesa #${r.mesa_id}</td>
                        <td>${estadoHTML}</td>
                        <td>${accionHTML}</td>
                    </tr>`;
            });
        });

        function marcarSalida(idReserva, idMesa) {
            if(confirm("¿El cliente ya desocupó la mesa? Los turnos de los clientes que esperan detrás de él avanzarán automáticamente.")) {
                socket.emit('marcar-salida-reserva', { id: idReserva, mesa_id: idMesa });
            }
        }
    </script>
</body>
</html>
