<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Libro de Reservas</title>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        if (!sessionStorage.getItem('usuarioLogueado')) {
            window.top.location.href = '/login.html';
        }
    </script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f6f8; padding: 30px; color: #2f3542; margin: 0; }
        h1 { margin-bottom: 25px; text-align: center; color: #2f3542; }
        table { width: 100%; background: white; border-collapse: collapse; border-radius: 12px; overflow: hidden; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #f1f2f6; font-size: 14px; }
        th { background: #2f3542; color: white; text-transform: uppercase; font-size: 13px; }
        .badge-activa { background: #e8fcf0; color: #2ed573; padding: 6px 12px; border-radius: 20px; font-weight: bold; display: inline-block; }
        .badge-final { background: #f1f2f6; color: #747d8c; padding: 6px 12px; border-radius: 20px; font-weight: bold; display: inline-block; }
        .btn-salida { background: #ff4757; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: background 0.3s ease; }
        .btn-salida:hover { background: #ff6b81; }
        .txt-salida { font-size: 12px; color: #747d8c; font-weight: bold; }
    </style>
</head>
<body>

    <h1>📅 Libro de Reservas Activas</h1>

    <table>
        <thead>
            <tr>
                <th>Llegada Estimada</th>
                <th>Cliente</th>
                <th>Ubicación / Mesa</th>
                <th>Estado del Turno</th>
                <th>Acción Operativa</th>
            </tr>
        </thead>
        <tbody id="tabla-reservas">
            <tr><td colspan="5" style="text-align:center; color:#999; padding:30px; font-size:16px;">Sincronizando reservas con Supabase...</td></tr>
        </tbody>
    </table>

   <script>
        const socket = io();
        const miTenant = sessionStorage.getItem('tenant_id') || 'tenant_costenita';

        socket.on('connect', () => {
            socket.emit('unirse-a-restaurante', miTenant);
            socket.emit('obtener-historial-reservas', miTenant);
        });

        socket.on('cargar-historial-reservas', (reservas) => {
            const cuerpoTabla = document.getElementById('tabla-reservas');
            cuerpoTabla.innerHTML = "";

            if (!reservas || reservas.length === 0) {
                cuerpoTabla.innerHTML = `<tr><td colspan="5" style="text-align:center; padding:20px; color:#a4b0be;">Sin registros en el libro de reservas.</td></tr>`;
                return;
            }

            reservas.forEach(r => {
                let badgeEstado = "";
                let columnaAccion = "";

                if (r.estado === 'activa') {
                    badgeEstado = `<span class="badge-activa">🟢 En Espera (Turno #${r.turno_sala})</span>`;
                    columnaAccion = `<button class="btn-salida" onclick="desocuparMesa(${r.id})">🚪 Finalizar / Salió</button>`;
                } else if (r.estado === 'completado') {
                    badgeEstado = `<span style="background:#ffeaa7; color:#d63031; padding:4px 8px; border-radius:4px; font-weight:bold;">🍳 Comiendo</span>`;
                    columnaAccion = `<button class="btn-salida" onclick="desocuparMesa(${r.id})">🚪 Finalizar / Salió</button>`;
                } else {
                    badgeEstado = `<span class="badge-final">⚪ Concluida</span>`;
                    columnaAccion = `<span style="color:#747d8c; font-size:13px;">Servicio terminado</span>`;
                }

                cuerpoTabla.innerHTML += `
                    <tr>
                        <td><strong>${r.fecha}</strong><br><span style="color:#747d8c; font-size:12px;">Hora: ${r.hora}</span></td>
                        <td><strong>${r.cliente}</strong><br><span style="font-size:12px; color:#57606f;">👥 ${r.personas} Pers.</span></td>
                        <td><strong>🏢 ${r.sucursal || 'Principal'}</strong><br>Mesa #${r.mesa_id || '1'}</td>
                        <td>${badgeEstado}</td>
                        <td>${columnaAccion}</td>
                    </tr>
                `;
            });
        });

        function desocuparMesa(idReserva) {
            if (confirm("¿Confirmar que el cliente ha concluido su servicio y se retira del establecimiento?")) {
                socket.emit('marcar-salida-reserva', { id: idReserva, tenant_id: miTenant });
            }
        }
    </script>
</body>
</html>
