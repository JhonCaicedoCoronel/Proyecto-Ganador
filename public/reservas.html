<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Libro de Reservas</title>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        if (!sessionStorage.getItem('usuarioLogueado')) {
            window.top.location.href = '/login.html';
        }
    </script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f6f8; padding: 30px; color: #2f3542; margin: 0; }
        h1 { margin-bottom: 25px; text-align: center; color: #2f3542; }
        table { width: 100%; background: white; border-collapse: collapse; border-radius: 12px; overflow: hidden; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #f1f2f6; font-size: 14px; }
        th { background: #2f3542; color: white; text-transform: uppercase; font-size: 13px; }
        .badge-activa { background: #e8fcf0; color: #2ed573; padding: 6px 12px; border-radius: 20px; font-weight: bold; display: inline-block; }
        .badge-final { background: #f1f2f6; color: #747d8c; padding: 6px 12px; border-radius: 20px; font-weight: bold; display: inline-block; }
        .btn-salida { background: #ff4757; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: background 0.3s ease; }
        .btn-salida:hover { background: #ff6b81; }
        .txt-salida { font-size: 12px; color: #747d8c; font-weight: bold; }
    </style>
</head>
<body>

    <h1>📅 Libro de Reservas Activas</h1>

    <table>
        <thead>
            <tr>
                <th>Llegada Estimada</th>
                <th>Cliente</th>
                <th>Ubicación / Mesa</th>
                <th>Estado del Turno</th>
                <th>Acción Operativa</th>
            </tr>
        </thead>
        <tbody id="tabla-reservas">
            <tr><td colspan="5" style="text-align:center; color:#999; padding:30px; font-size:16px;">Sincronizando reservas con Supabase...</td></tr>
        </tbody>
    </table>

    <script>
        const socket = io();
        
        let miTenant = sessionStorage.getItem('tenant_id');
        if (!miTenant || miTenant === "null" || miTenant === "undefined") {
            miTenant = 'tenant_costenita';
            sessionStorage.setItem('tenant_id', miTenant);
        }

        // Al restablecer conexión por actualizar pantalla
        socket.on('connect', () => {
            console.log("Libro de reservas conectado, sincronizando local:", miTenant);
            socket.emit('unirse-a-restaurante', miTenant);
            socket.emit('obtener-historial-reservas', miTenant); // Carga fijos tus datos originales
        });

        socket.on('cargar-historial-reservas', (reservas) => {
            const tbody = document.getElementById('tabla-reservas');
            tbody.innerHTML = "";

            if (!reservas || reservas.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:#999; padding:30px; font-size:16px;">📅 No existen registros de reservas en este local comercial.</td></tr>`;
                return;
            }

            reservas.forEach(r => {
                let estadoHTML = (r.estado === 'activa' || !r.estado) ? `<span class="badge-activa">🟢 Fila: Turno #${r.turno_sala || 1}</span>` : `<span class="badge-final">⚪ Finalizada</span>`;
                let accionHTML = (r.estado === 'activa' || !r.estado) ? `<button class="btn-salida" onclick="marcarSalida(${r.id}, ${r.mesa_id})">🚪 Desocupó Mesa</button>` : `<span class="txt-salida">Salió a las: ${r.hora_salida || 'N/D'}</span>`;
                let sucursalTxt = r.sucursal ? r.sucursal : "Urdesa";

                tbody.innerHTML += `
                    <tr>
                        <td><strong>${r.fecha}</strong><br><span style="color:#a4b0be; font-size:12px;">Para las ${r.hora}</span></td>
                        <td><strong style="font-size:16px;">${r.cliente}</strong><br>👤 ${r.personas} Personas</td>
                        <td><strong style="color:#0a3d62;">🏢 ${sucursalTxt}</strong><br>Mesa #${r.mesa_id}</td>
                        <td>${estadoHTML}</td>
                        <td>${accionHTML}</td>
                    </tr>`;
            });
        });

        // Escucha en vivo si un cliente añade una reserva desde el quiosco
        socket.on('reserva-confirmada-actualizar', () => {
            socket.emit('obtener-historial-reservas', miTenant);
        });

        function marcarSalida(idReserva, idMesa) {
            if (confirm("¿Confirmar que el comensal ha liberado y desocupado la mesa?")) {
                // Mandamos el id, mesa y el tenant para el reajuste dinámico de turnos en Supabase
                socket.emit('marcar-salida-reserva', { id: idReserva, mesa_id: idMesa, tenant_id: miTenant });
            }
        }
    </script>
</body>
</html>
