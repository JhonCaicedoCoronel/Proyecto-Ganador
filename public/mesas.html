<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Monitor de Mesas - J&J Foods</title>
    <style>
        body { font-family: Arial; background: #2c3e50; color: white; padding: 20px; }
        .grid-mesas { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .mesa { padding: 20px; border-radius: 10px; text-align: center; font-weight: bold; font-size: 18px; }
        .disponible { background: #2ecc71; color: white; }
        .reservada { background: #f1c40f; color: black; }
        .ocupada { background: #e74c3c; color: white; }
    </style>
</head>
<body>
    <h1>🪑 Monitor de Salas (En Vivo)</h1>
    <div id="contenedor-mesas" class="grid-mesas"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        window.onload = () => socket.emit('pedir-monitor-mesas');

        // Escucha si alguien desde su celular reservó una mesa para actualizar la pantalla sola
        socket.on('actualizar-monitor-mesas', () => socket.emit('pedir-monitor-mesas'));

        socket.on('renderizar-mesas', (mesas) => {
            const div = document.getElementById('contenedor-mesas');
            div.innerHTML = '';
            mesas.forEach(m => {
                let claseCSS = m.estado === 'Disponible' ? 'disponible' : (m.estado === 'Reservada' ? 'reservada' : 'ocupada');
                div.innerHTML += `
                    <div class="mesa ${claseCSS}">
                        MESA ${m.numero}<br>
                        <span style="font-size:12px;">Capacidad: ${m.capacidad} pax</span><br>
                        <span style="font-size:14px; text-transform:uppercase;">${m.estado}</span>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
