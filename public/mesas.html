<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor de Mesas | J&J Foods</title>
    
    <script>
        if(sessionStorage.getItem('admin_auth') !== 'true') {
            window.parent.location.href = 'login.html';
        }
    </script>

    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f1f2f6; padding: 20px; }
        
        .header-titulo { color: #2d3436; margin-bottom: 20px; font-size: 24px; border-bottom: 2px solid #00b894; padding-bottom: 10px; }

        .grid-mesas {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .mesa-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border: 4px solid #dfe6e9;
            transition: all 0.3s ease;
        }

        .mesa-card h2 { font-size: 22px; margin-bottom: 10px; color: #2d3436; }
        .mesa-capacidad { font-size: 14px; color: #636e72; margin-bottom: 15px; }

        /* Estados de la Mesa */
        .estado-disponible { border-color: #00b894; background-color: #e8f8f5; }
        .estado-ocupada { border-color: #ff7675; background-color: #ffeaea; }
        .estado-sucia { border-color: #fdcb6e; background-color: #fff9e6; }

        .estado-badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 13px;
            font-weight: bold;
            color: white;
            margin-bottom: 15px;
        }
        
        .badge-verde { background: #00b894; }
        .badge-rojo { background: #d63031; }
        .badge-amarillo { background: #e1b12c; }

        select {
            width: 100%;
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #b2bec3;
            outline: none;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1 class="header-titulo">🪑 Monitor Operativo de Sala</h1>

    <div class="grid-mesas" id="contenedorMesas">
        </div>

    <script>
        const socket = io();
        const contenedor = document.getElementById('contenedorMesas');

        // Forzar carga de mesas al abrir
        window.onload = () => {
            contenedor.innerHTML = '<p style="color:#636e72;">Cargando distribución de sala...</p>';
            socket.emit('pedir-mesas');
        };

        // Recibir mesas
        socket.on('actualizar-mesas', (mesas) => {
            contenedor.innerHTML = '';
            
            if(mesas.length === 0) {
                contenedor.innerHTML = '<p style="color:#ff7675; font-weight:bold;">No hay mesas registradas en la base de datos.</p>';
                return;
            }

            // Ordenar por número de mesa
            mesas.sort((a, b) => a.numero - b.numero).forEach(mesa => {
                
                let claseEstado = 'estado-disponible';
                let claseBadge = 'badge-verde';
                let textoEstado = 'Disponible';

                if(mesa.estado === 'ocupada') {
                    claseEstado = 'estado-ocupada';
                    claseBadge = 'badge-rojo';
                    textoEstado = 'Ocupada';
                } else if (mesa.estado === 'sucia') {
                    claseEstado = 'estado-sucia';
                    claseBadge = 'badge-amarillo';
                    textoEstado = 'Sucia / Limpiando';
                }

                contenedor.innerHTML += `
                    <div class="mesa-card ${claseEstado}">
                        <h2>Mesa ${mesa.numero}</h2>
                        <div class="mesa-capacidad">👥 Capacidad: ${mesa.capacidad} personas</div>
                        <div class="estado-badge ${claseBadge}">${textoEstado}</div>
                        
                        <select onchange="cambiarEstadoMesa(${mesa.id}, this.value)">
                            <option value="" disabled selected>Cambiar estado...</option>
                            <option value="disponible">🟢 Marcar Libre</option>
                            <option value="ocupada">🔴 Marcar Ocupada</option>
                            <option value="sucia">🟡 Marcar Sucia</option>
                        </select>
                    </div>
                `;
            });
        });

        function cambiarEstadoMesa(id, nuevoEstado) {
            if(!nuevoEstado) return;
            socket.emit('cambiar-estado-mesa', { id: id, estado: nuevoEstado });
        }
    </script>
</body>
</html>
