<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Monitor de Sala J & J</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #1e222b; color: white; padding-bottom: 30px; }
        
        .nav-admin { background: #2f3542; padding: 15px 20px; display: flex; gap: 15px; justify-content: center; margin-bottom: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); flex-wrap: wrap; }
        .nav-admin a { text-decoration: none; font-weight: bold; padding: 10px 20px; border-radius: 8px; transition: 0.2s; font-size: 15px; }
        .nav-activo { background: #ff4757; color: white; box-shadow: 0 2px 5px rgba(255,71,87,0.4); }
        .nav-inactivo { background: rgba(255,255,255,0.1); color: white; }
        .nav-inactivo:hover { background: rgba(255,255,255,0.2); }
        .nav-link { color: #2ed573; border: 1px solid #2ed573; margin-left: auto; }
        .nav-link:hover { background: #2ed573; color: white; }

        .container { padding: 0 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 25px; }
        .box { background: #2f3542; padding: 20px; border-radius: 12px; text-align: center; border-top: 8px solid #2ed573; }
        .box.disponible { border-top-color: #2ed573; }
        .box.ocupada { border-top-color: #ff4757; }
        .box.sucia { border-top-color: #ffa502; }
        select { width: 100%; padding: 8px; background: #3d4452; color: white; border: none; border-radius: 4px; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <nav class="nav-admin">
        <a href="/admin.html" class="nav-inactivo">🍔 Editor de Menú</a>
        <a href="/mesas.html" class="nav-activo">🪑 Monitor de Mesas</a>
        <a href="/cocina.html" class="nav-inactivo">👨‍🍳 Pantalla Cocina</a>
        <a href="/historial.html" class="nav-inactivo">📈 Historial Ventas</a>
        <a href="/quiosco.html" target="_blank" class="nav-link">👀 Ver Quiosco Cliente ↗</a>
    </nav>

    <div class="container">
        <h1 style="margin-bottom:25px;">🪑 Gestión Operativa de Sala</h1>
        <div class="grid" id="mesas-box"></div>
    </div>

    <script>
        const socket = io();
        socket.on('cargar-mesas-inicial', drawMesas);
        socket.on('mesas-actualizadas', drawMesas);

        function drawMesas(mesas) {
            const c = document.getElementById('mesas-box'); c.innerHTML = "";
            mesas.forEach(m => {
                c.innerHTML += `
                    <div class="box ${m.estado}">
                        <h3>Mesa ${m.numero}</h3>
                        <p style="font-size:12px; color:#a4b0be; margin:5px 0;">📍 Ubicación: <strong>${m.ubicacion}</strong></p>
                        <p style="font-size:12px; color:#ccc;">Capacidad: ${m.capacidad} pers.</p>
                        <select onchange="updateMesa(${m.numero}, this.value)">
                            <option value="disponible" ${m.estado==='disponible'?'selected':''}>🟢 Libre</option>
                            <option value="ocupada" ${m.estado==='ocupada'?'selected':''}>🔴 Ocupada</option>
                            <option value="sucia" ${m.estado==='sucia'?'selected':''}>🟡 Sucia</option>
                        </select>
                    </div>`;
            });
        }
        function updateMesa(n, est) { socket.emit('cambiar-estado-mesa', { numero: n, estado: est }); }
    </script>
</body>
</html>
